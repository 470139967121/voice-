<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="50%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a07810"/>
      <stop offset="50%" stop-color="#f0c246"/>
      <stop offset="100%" stop-color="#a07810"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(212,160,23,0.15)"/>
      <stop offset="100%" stop-color="rgba(212,160,23,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bg)"/>
  <rect width="600" height="200" fill="url(#glow)"/>

  <!-- Decorative gold border lines -->
  <line x1="30" y1="20" x2="570" y2="20" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="180" x2="570" y2="180" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>

  <!-- Left lotus -->
  <g transform="translate(70,100)" opacity="0.3">
    <ellipse cx="0" cy="-15" rx="12" ry="22" fill="#d4a017" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-15" rx="12" ry="22" fill="#d4a017" transform="rotate(15)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="18" fill="#f0c246"/>
    <circle cx="0" cy="-5" r="4" fill="#e67e22"/>
  </g>

  <!-- Right lotus -->
  <g transform="translate(530,100)" opacity="0.3">
    <ellipse cx="0" cy="-15" rx="12" ry="22" fill="#d4a017" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-15" rx="12" ry="22" fill="#d4a017" transform="rotate(15)"/>
    <ellipse cx="0" cy="-18" rx="8" ry="18" fill="#f0c246"/>
    <circle cx="0" cy="-5" r="4" fill="#e67e22"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="140" cy="50" r="2" fill="#d4a017" opacity="0.3"/>
  <circle cx="460" cy="50" r="2" fill="#d4a017" opacity="0.3"/>
  <circle cx="160" cy="155" r="1.5" fill="#d4a017" opacity="0.2"/>
  <circle cx="440" cy="155" r="1.5" fill="#d4a017" opacity="0.2"/>
  <circle cx="200" cy="35" r="1" fill="#f0c246" opacity="0.25"/>
  <circle cx="400" cy="35" r="1" fill="#f0c246" opacity="0.25"/>

  <!-- Main title -->
  <text x="300" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="bold" fill="#f0c246" letter-spacing="1">
    Happy Khmer New Year!
  </text>

  <!-- Khmer script -->
  <text x="300" y="108" text-anchor="middle" font-size="22" fill="#d4a017" opacity="0.85">
    សួស្តីឆ្នាំថ្មី
  </text>

  <!-- Subtitle -->
  <text x="300" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#c4a878" letter-spacing="2">
    CHOUL CHNAM THMEY 2026
  </text>

  <!-- ShyTalk branding (subtle) -->
  <text x="300" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8a7050" letter-spacing="1">
    ShyTalk
  </text>
</svg>
