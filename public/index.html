<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShyTalk — Coming Soon</title>
<style>
  :root {
    --bg: #0f0d15;
    --surface: #1c1a24;
    --border: #3a3550;
    --text: #e8e0f0;
    --text2: #a89ec0;
    --primary: #6750a4;
    --primary-glow: #9a82db;
    --accent: #d0bcff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle radial glow behind content */
  body::before {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(103,80,164,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .logo span {
    color: var(--accent);
    text-shadow: 0 0 24px rgba(208,188,255,0.3);
  }

  .tagline {
    color: var(--text2);
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
  }

  .badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 1.6rem;
    font-size: 0.95rem;
    color: var(--text2);
    letter-spacing: 0.04em;
  }

  .badge .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 6px var(--primary-glow);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--primary-glow); }
    50% { opacity: 0.4; box-shadow: 0 0 2px var(--primary-glow); }
  }

  .links {
    margin-top: 2.5rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }

  .links a:hover {
    color: var(--accent);
  }

  .links .coming-soon-link {
    opacity: 0.5;
    cursor: default;
  }
</style>
</head>
<body>
  <div class="container">

    <p class="tagline" data-i18n="tagline">Voice chat rooms, reimagined.</p>
    <div class="badge"><span class="dot"></span><span data-i18n="coming_soon">Coming Soon</span></div>
    <div class="links">
      <a href="https://play.google.com/store/apps/details?id=com.shyden.shytalk">Google Play</a>
      <a class="coming-soon-link" data-i18n="app_store" data-i18n-title="app_store_title" title="Coming soon to iOS">App Store (Coming Soon)</a>
