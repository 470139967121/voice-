<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShyTalk — Coming Soon</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2e3348;
    --text: #e4e6f0;
    --text2: #9498b0;
    --accent: #6c5ce7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
  }

  .logo {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    color: var(--text2);
    font-size: 1.1rem;
    margin-bottom: 2.5rem;
  }

  .badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 1.6rem;
    font-size: 0.95rem;
    color: var(--text2);
    letter-spacing: 0.04em;
  }

  .badge .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .links {
    margin-top: 2.5rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
  }

  .links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }

  .links a:hover {
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">Shy<span>Talk</span></div>
    <p class="tagline">Voice chat rooms, reimagined.</p>
    <div class="badge"><span class="dot"></span>Coming Soon</div>
    <div class="links">
      <a href="https://play.google.com/store/apps/details?id=com.shyden.shytalk">Google Play</a>
    </div>
  </div>
</body>
</html>
