<meta charset="UTF-8">

<title>ShyTalk — Coming Soon</title>
<style>
  :root {
    --bg: #0f0d15;
    --surface: #1c1a24;
    --border: #3a3550;
    --text: #e8e0f0;
    --text2: #a89ec0;
    --primary: #6750a4;
    --primary-glow: #9a82db;
    --accent: #d0bcff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    /*
     * flex-direction: column so shared-header.js (injects <header> as
     * the first body child) sits at the top instead of becoming a
     * row-flex item beside <main> — that regression made the header
     * render as a 223px-wide box vertically centered next to the
     * Coming Soon content.
     *
     * align-items left at default (stretch) so the header spans the
     * full viewport width; main centers via margin: auto below.
     * overflow: hidden retained for the radial-glow ::before — the
     * page is intentionally non-scrolling.
     */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Subtle radial glow behind content */
  body::before {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(600px, 100vw);
    height: min(600px, 100vh);
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(103,80,164,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 520px;
    position: relative;
    z-index: 1;
    /* margin: auto absorbs the remaining vertical AND horizontal
       space inside body's flex column → vertically centered between
       the header and the bottom of the viewport, horizontally
       centered within the viewport. */
    margin: auto;
  }

  .logo {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.25rem;
  }

  .logo span {
    color: var(--accent);
    text-shadow: 0 0 24px rgba(208,188,255,0.3);
  }

  .tagline {
    color: var(--text2);
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
  }

  .badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.6rem 1.6rem;
    font-size: 0.95rem;
    color: var(--text2);
    letter-spacing: 0.04em;
  }

  .badge .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 6px var(--primary-glow);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--primary-glow); }
    50% { opacity: 0.4; box-shadow: 0 0 2px var(--primary-glow); }
  }

  .links {
    margin-top: 2.5rem;
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }

  .links a:hover, .links a:focus-visible {
    color: var(--accent);
  }

  .links a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .links .coming-soon-link {
    opacity: 0.5;
    cursor: default;
  }

  .roadmap-cta {
    display: inline-block;
    margin-top: 2rem;
    padding: 0.9rem 2.2rem;
    background: linear-gradient(135deg, var(--primary), #9a82db);
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(103,80,164,0.4);
  }
  .roadmap-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(103,80,164,0.6);
  }
  .roadmap-cta .sparkle {
    margin-right: 0.4rem;
    font-size: 1.1rem;
  }
  .roadmap-label {
    display: block;
    margin-top: 0.6rem;
    font-size: 0.8rem;
    color: var(--text2);
    opacity: 0.7;
  }
</style>
<script src="/js/logger.js"></script>
