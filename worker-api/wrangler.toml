name = "shytalk-api"
account_id = "9315582c39b627dca58dfa83602db385"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket (already exists from worker/) ──────────────────────
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "shytalk-media"

# ── KV Namespace (config cache, rate limiting) ───────────────────
[[kv_namespaces]]
binding = "KV"
id = "dc68f6d3e52645f19413afc3ba635860"

# ── Durable Object migration (delete previous DO classes) ────────
[[migrations]]
tag = "v2"
deleted_classes = ["RoomDurableObject", "ConversationDurableObject"]

# ── Secrets (set via `wrangler secret put`) ──────────────────────
# FIREBASE_API_KEY         — for Firebase ID token verification
# FIREBASE_PROJECT_ID      — for JWT audience check
# LIVEKIT_API_KEY           — for LiveKit token generation
# LIVEKIT_API_SECRET        — for LiveKit token generation
# CLOUDFLARE_ACCOUNT_ID     — for R2 S3-compatible API (set in wrangler.toml as account_id)
# R2_ACCESS_KEY             — for R2 S3-compatible API
# R2_SECRET_KEY             — for R2 S3-compatible API

# ── Cron Triggers (Phase 8) ──────────────────────────────────────
[triggers]
crons = [
  "0 3 * * SUN",  # archiveOldReports — Sunday 03:00 UTC
  "0 4 * * *",    # cleanupOrphanedStorage — daily 04:00 UTC
  "0 0 * * *",    # checkSubscriptionStatus + cleanExpiredBackpackItems — daily 00:00 UTC
  # updateGiftRankings cron REMOVED — rankings now updated incrementally in economy.js
  "*/5 * * * *",  # closeStaleOwnerAwayRooms — every 5 minutes
  "0 2 * * *",    # backupUserProfiles + cleanupClosedRooms — daily 02:00 UTC
]

# ── Environment ──────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
CDN_URL = "https://images.shytalk.shyden.co.uk"
