name = "shytalk-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ──────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "shytalk-db"
database_id = "b6dafad0-0fd9-4170-b714-7c7089552fb6"
migrations_dir = "migrations"

# ── R2 Bucket (already exists from worker/) ──────────────────────
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "shytalk-media"

# ── KV Namespace (config cache, rate limiting) ───────────────────
[[kv_namespaces]]
binding = "KV"
id = "dc68f6d3e52645f19413afc3ba635860"

# ── Durable Objects ──────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "ROOM_DO", class_name = "RoomDurableObject" },
  { name = "CONVERSATION_DO", class_name = "ConversationDurableObject" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDurableObject", "ConversationDurableObject"]

# ── Secrets (set via `wrangler secret put`) ──────────────────────
# FIREBASE_API_KEY         — for Firebase ID token verification
# FIREBASE_PROJECT_ID      — for JWT audience check
# LIVEKIT_API_KEY           — for LiveKit token generation
# LIVEKIT_API_SECRET        — for LiveKit token generation
# CF_ACCOUNT_ID             — for R2 S3-compatible API
# R2_ACCESS_KEY             — for R2 S3-compatible API
# R2_SECRET_KEY             — for R2 S3-compatible API

# ── Cron Triggers (Phase 8) ──────────────────────────────────────
[triggers]
crons = [
  "0 3 * * SUN",  # archiveOldReports — Sunday 03:00 UTC
  "0 4 * * *",    # cleanupOrphanedStorage — daily 04:00 UTC
  "0 0 * * *",    # checkSubscriptionStatus + cleanExpiredBackpackItems — daily 00:00 UTC
  "0 * * * *",    # updateGiftRankings — hourly
]

# ── Environment ──────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
CDN_URL = "https://images.shytalk.shyden.co.uk"
