# detekt.yml — ShyTalk custom configuration
# Only enable naming and style rule sets. Others are too noisy for Compose/mobile apps.

complexity:
  active: false

coroutines:
  active: false

empty-blocks:
  active: false

exceptions:
  active: false

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - "Composable"
  MatchingDeclarationName:
    active: false

performance:
  active: false

potential-bugs:
  active: false

style:
  active: false
