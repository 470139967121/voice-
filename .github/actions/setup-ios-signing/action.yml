name: 'Setup iOS Signing'
description: 'Set up iOS code signing (certificate, profile, Xcode, App Store key)'
inputs:
  certificate-base64:
    description: 'Base64-encoded .p12 certificate'
    required: true
  certificate-password:
    description: 'Certificate password'
    required: true
  provision-profile-base64:
    description: 'Base64-encoded provisioning profile'
    required: true
  app-store-connect-key:
    description: 'App Store Connect API key (.p8 content)'
    required: true
  app-store-connect-key-id:
    description: 'App Store Connect key ID'
    required: true
  xcode-version:
    description: 'Major Xcode version to select'
    required: false
    default: '26'
runs:
  using: 'composite'
  steps:
    - name: Select Xcode ${{ inputs.xcode-version }}
      shell: bash
      run: |
        # GitHub-hosted runners ship Xcode at /Applications/Xcode_<version>.app,
        # self-hosted runners typically have /Applications/Xcode.app (no suffix).
        # Try the versioned path first, fall back to the unversioned one if its
        # CFBundleShortVersionString matches the requested major version.
        # `|| true` is required because GitHub's `shell: bash` runs with
        # `-eo pipefail`, and an empty glob makes the `ls | head` pipeline
        # exit non-zero on self-hosted runners that don't have the versioned
        # Xcode path. Suppressing keeps execution flowing into the fallback.
        XCODE=$(ls -d /Applications/Xcode_${{ inputs.xcode-version }}*.app 2>/dev/null | head -1 || true)
        if [ -z "$XCODE" ] && [ -d /Applications/Xcode.app ]; then
          ACTUAL=$(defaults read /Applications/Xcode.app/Contents/Info CFBundleShortVersionString 2>/dev/null || echo "")
          if [[ "$ACTUAL" == "${{ inputs.xcode-version }}" || "$ACTUAL" == "${{ inputs.xcode-version }}".* ]]; then
            XCODE=/Applications/Xcode.app
          fi
        fi
        if [ -z "$XCODE" ]; then
          echo "Available Xcode versions:"
          ls /Applications/Xcode*.app 2>/dev/null || echo "(none)"
          echo "::error::Xcode ${{ inputs.xcode-version }} not found on this runner"
          exit 1
        fi
        # Use DEVELOPER_DIR env var instead of `sudo xcode-select -s`. The env
        # var is honoured by xcodebuild / xcrun / clang; setting it via
        # GITHUB_ENV means subsequent steps inherit it. Avoids needing
        # passwordless sudo on self-hosted runners.
        echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"
        echo "Selected: $XCODE"

    - name: Install Apple API key
      shell: bash
      env:
        APP_STORE_CONNECT_KEY: ${{ inputs.app-store-connect-key }}
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.app-store-connect-key-id }}
      # umask 077 makes secret files mode 0600 (owner-read only) regardless
      # of the runner's default umask. On a self-hosted Mac with multiple
      # UIDs, the file-system permission is the actual security boundary —
      # without this the .p8 lands as world-readable 0644.
      #
      # Write to $RUNNER_TEMP/private_keys/ instead of $HOME/private_keys/
      # so the .p8 lives in the runner's per-job temp area. On a self-hosted
      # Mac this means a force-killed job can't leave the credential
      # persisting under $HOME indefinitely. The cleanup composite action
      # cleans both paths so legacy leftovers from before this change still
      # get scrubbed.
      run: |
        set -euo pipefail
        umask 077
        KEY_DIR="$RUNNER_TEMP/private_keys"
        mkdir -p "$KEY_DIR"
        chmod 700 "$KEY_DIR"
        printf '%s' "$APP_STORE_CONNECT_KEY" > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

    - name: Decode signing certificate and provisioning profile
      shell: bash
      env:
        IOS_CERTIFICATE_BASE64: ${{ inputs.certificate-base64 }}
        IOS_CERTIFICATE_PASSWORD: ${{ inputs.certificate-password }}
        IOS_PROVISION_PROFILE_BASE64: ${{ inputs.provision-profile-base64 }}
      run: |
        set -euo pipefail
        umask 077
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
        security create-keychain -p "" "$KEYCHAIN_PATH"
        # Auto-lock after 2 h. The previous 30 min value was based on
        # "comfortably exceeds typical iOS deploy time (~20 min)" but the
        # 2026-04-29 deploy hit codesign at 37 min on a slow runner-pool
        # day, causing errSecInternalComponent because the keychain had
        # already locked mid-build. The job's hard timeout is 90 min, so
        # 2 h (7200s) comfortably exceeds even the worst-case run while
        # still being 3x tighter than the original 6 h. A coresident
        # attacker who happens to land during this window still has to
        # bypass file-mode 0600, umask 077, and the partition list — the
        # auto-lock is defence-in-depth, not the primary boundary.
        security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
        security unlock-keychain -p "" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
        # Include the user's login keychain in the search list so codesign can
        # find the Apple WWDR intermediate + Apple Root CA needed to validate
        # the leaf cert's chain. On GitHub-hosted runners those certs are
        # already in the temporary keychain via the .p12; on self-hosted Macs
        # they live in the user's login keychain (installed by Xcode).
        # Without this we'd get "unable to build chain to self-signed root".
        security list-keychain -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
        PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
        echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
        # PlistBuddy is exact and robust against grep/sed brittleness if
        # Apple changes whitespace or nests <string> tags in a future macOS.
        # `|| true` keeps set -e from aborting the assignment on PlistBuddy
        # failure — the explicit empty-check below fires with a diagnostic
        # ::error:: message instead of a raw bash-1 exit on the assignment line.
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<<"$(/usr/bin/security cms -D -i "$PROFILE_PATH")" || true)
        if [ -z "$PROFILE_UUID" ]; then
          echo "::error::Could not extract UUID from provisioning profile at $PROFILE_PATH (PlistBuddy failed or :UUID missing)"
          exit 1
        fi
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
        chmod 600 ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
