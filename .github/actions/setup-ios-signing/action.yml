name: 'Setup iOS Signing'
description: 'Set up iOS code signing (certificate, profile, Xcode, App Store key)'
inputs:
  certificate-base64:
    description: 'Base64-encoded .p12 certificate'
    required: true
  certificate-password:
    description: 'Certificate password'
    required: true
  provision-profile-base64:
    description: 'Base64-encoded provisioning profile'
    required: true
  app-store-connect-key:
    description: 'App Store Connect API key (.p8 content)'
    required: true
  app-store-connect-key-id:
    description: 'App Store Connect key ID'
    required: true
  xcode-version:
    description: 'Major Xcode version to select'
    required: false
    default: '26'
runs:
  using: 'composite'
  steps:
    - name: Select Xcode ${{ inputs.xcode-version }}
      shell: bash
      run: |
        # GitHub-hosted runners ship Xcode at /Applications/Xcode_<version>.app,
        # self-hosted runners typically have /Applications/Xcode.app (no suffix).
        # Try the versioned path first, fall back to the unversioned one if its
        # CFBundleShortVersionString matches the requested major version.
        # `|| true` is required because GitHub's `shell: bash` runs with
        # `-eo pipefail`, and an empty glob makes the `ls | head` pipeline
        # exit non-zero on self-hosted runners that don't have the versioned
        # Xcode path. Suppressing keeps execution flowing into the fallback.
        XCODE=$(ls -d /Applications/Xcode_${{ inputs.xcode-version }}*.app 2>/dev/null | head -1 || true)
        if [ -z "$XCODE" ] && [ -d /Applications/Xcode.app ]; then
          ACTUAL=$(defaults read /Applications/Xcode.app/Contents/Info CFBundleShortVersionString 2>/dev/null || echo "")
          if [[ "$ACTUAL" == "${{ inputs.xcode-version }}" || "$ACTUAL" == "${{ inputs.xcode-version }}".* ]]; then
            XCODE=/Applications/Xcode.app
          fi
        fi
        if [ -z "$XCODE" ]; then
          echo "Available Xcode versions:"
          ls /Applications/Xcode*.app 2>/dev/null || echo "(none)"
          echo "::error::Xcode ${{ inputs.xcode-version }} not found on this runner"
          exit 1
        fi
        # Use DEVELOPER_DIR env var instead of `sudo xcode-select -s`. The env
        # var is honoured by xcodebuild / xcrun / clang; setting it via
        # GITHUB_ENV means subsequent steps inherit it. Avoids needing
        # passwordless sudo on self-hosted runners.
        echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"
        echo "Selected: $XCODE"

    - name: Install Apple API key
      shell: bash
      env:
        APP_STORE_CONNECT_KEY: ${{ inputs.app-store-connect-key }}
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.app-store-connect-key-id }}
      run: |
        mkdir -p ~/private_keys
        echo "$APP_STORE_CONNECT_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

    - name: Decode signing certificate and provisioning profile
      shell: bash
      env:
        IOS_CERTIFICATE_BASE64: ${{ inputs.certificate-base64 }}
        IOS_CERTIFICATE_PASSWORD: ${{ inputs.certificate-password }}
        IOS_PROVISION_PROFILE_BASE64: ${{ inputs.provision-profile-base64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
        security create-keychain -p "" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "" "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
        echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
        PROFILE_UUID=$(/usr/bin/security cms -D -i "$PROFILE_PATH" 2>/dev/null | grep -A1 '<key>UUID</key>' | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
