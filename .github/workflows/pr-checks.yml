name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write       # needed by e2e/playwright allure-report (gh-pages deploy)
  checks: write
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app_changed: ${{ steps.changes.outputs.app_changed }}
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      web_changed: ${{ steps.changes.outputs.web_changed }}
      workflow_only: ${{ steps.changes.outputs.workflow_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          # Diff entire branch against main — not just the latest push.
          # This ensures all changes in the PR are detected, even if the
          # latest push only touches workflow files.
          MERGE_BASE=$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          CHANGED=$(git diff --name-only "$MERGE_BASE...${{ github.event.pull_request.head.sha }}")
          APP=false BACKEND=false WEB=false OTHER=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              public/*.md) WEB=true ;;
              public/*) WEB=true ;;
              app/*|shared/*|iosApp/*|gradle/*|*.gradle.kts|gradle.properties|gradlew|gradlew.bat) APP=true ;;
              express-api/*|firestore.rules|database.rules.json) BACKEND=true ;;
              .github/*|.claude/*|.project/*|*.md|.gitignore|.gitattributes) ;;
              *) OTHER=true ;;
            esac
          done <<< "$CHANGED"
          WORKFLOW_ONLY=false
          if [ "$APP" = "false" ] && [ "$BACKEND" = "false" ] && [ "$WEB" = "false" ] && [ "$OTHER" = "false" ]; then
            WORKFLOW_ONLY=true
          fi
          for v in app_changed=$APP backend_changed=$BACKEND web_changed=$WEB workflow_only=$WORKFLOW_ONLY; do
            echo "$v" >> "$GITHUB_OUTPUT"
          done
          echo "Detection results: app=$APP backend=$BACKEND web=$WEB workflow_only=$WORKFLOW_ONLY"

  lint:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.workflow_only != 'true'
    uses: ./.github/workflows/lint.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      app_changed: ${{ needs.detect-changes.outputs.app_changed == 'true' }}
      backend_changed: ${{ needs.detect-changes.outputs.backend_changed == 'true' }}
    secrets: inherit

  build-and-test:
    name: Build & Test
    needs: [detect-changes, lint, test-backend]
    if: |
      always() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          prod-base64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}

      - uses: ./.github/actions/decode-keystore
        with:
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          fallback-debug: 'true'

      - name: Run unit tests, detekt, and build devRelease APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL || 'wss://placeholder.livekit.cloud' }}
        run: ./gradlew testDevDebugUnitTest :shared:jvmTest detekt assembleDevRelease jacocoDevDebugUnitTestReport --parallel

      - name: Publish unit test report
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          check_name: Unit Tests
          files: '**/build/test-results/**/TEST-*.xml'

      - name: Upload devRelease APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dev-release-apk
          path: app/build/outputs/apk/dev/release/*.apk

      - name: Upload build outputs for SonarCloud
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: build-outputs
          retention-days: 1
          path: |
            **/build/test-results/
            **/build/reports/
            **/build/classes/

      - name: Prepare Kotlin test report for GitHub Pages
        if: always()
        run: |
          mkdir -p kotlin-report
          cp -r shared/build/reports/tests/jvmTest/* kotlin-report/ 2>/dev/null || true
          cp -r app/build/reports/tests/testDevDebugUnitTest/* kotlin-report/ 2>/dev/null || true
          DATE=$(date +%Y-%m-%d)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "{\"passed\":0,\"failed\":0,\"total\":0,\"date\":\"${DATE}\",\"runUrl\":\"${RUN_URL}\",\"suite\":\"kotlin\",\"env\":\"pr\"}" > kotlin-report/metadata.json

      - name: Deploy Kotlin report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: kotlin-report
          destination_dir: kotlin/pr/latest
          keep_files: true

  sonarcloud:
    needs: [detect-changes, build-and-test]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.workflow_only != 'true' &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped')
    uses: ./.github/workflows/sonarcloud.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      app_changed: ${{ needs.detect-changes.outputs.app_changed == 'true' }}
    secrets: inherit

  test-backend:
    needs: [detect-changes, lint]
    if: |
      always() &&
      needs.detect-changes.outputs.backend_changed == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    uses: ./.github/workflows/test-backend.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      report_env: pr
    secrets: inherit

  android-e2e:
    needs: [detect-changes, build-and-test, sonarcloud]
    if: |
      always() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      needs.build-and-test.result == 'success' &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    uses: ./.github/workflows/e2e-tests.yml
    with:
      android: '33-phone'
      parallel: true
      ref: ${{ github.event.pull_request.head.sha }}
      report_env: pr
    secrets: inherit

  playwright-web:
    needs: [detect-changes, build-and-test, sonarcloud]
    if: |
      always() &&
      needs.detect-changes.outputs.web_changed == 'true' &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped') &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    uses: ./.github/workflows/playwright-tests.yml
    with:
      web: 'all'
      parallel: true
      ref: ${{ github.event.pull_request.head.sha }}
      report_env: pr
    secrets: inherit

  ios-e2e:
    needs: [detect-changes, build-and-test, sonarcloud]
    if: |
      always() &&
      needs.detect-changes.outputs.app_changed == 'true' &&
      needs.build-and-test.result == 'success' &&
      (needs.sonarcloud.result == 'success' || needs.sonarcloud.result == 'skipped')
    uses: ./.github/workflows/ios-tests.yml
    with:
      ios: 'none'
      parallel: true
      ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  gate:
    name: PR Gate
    needs: [detect-changes, lint, build-and-test, sonarcloud, test-backend, android-e2e, playwright-web, ios-e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          # detect-changes MUST succeed — if cancelled, all skips are invalid
          if [ "${{ needs.detect-changes.result }}" != "success" ]; then
            echo "detect-changes did not succeed: ${{ needs.detect-changes.result }}"
            exit 1
          fi

          # Check each job — failure or cancelled = block merge
          for result in \
            "${{ needs.lint.result }}" \
            "${{ needs.build-and-test.result }}" \
            "${{ needs.sonarcloud.result }}" \
            "${{ needs.test-backend.result }}" \
            "${{ needs.android-e2e.result }}" \
            "${{ needs.playwright-web.result }}" \
            "${{ needs.ios-e2e.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Required check failed: $result"
              exit 1
            fi
          done
          echo "All checks passed or were correctly skipped"
