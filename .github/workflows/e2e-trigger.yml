name: E2E Comment Trigger

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  parse-comment:
    name: Parse /run-e2e Comment
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      android: ${{ steps.parse.outputs.android }}
      ios: ${{ steps.parse.outputs.ios }}
      web: ${{ steps.parse.outputs.web }}
      ref: ${{ steps.parse.outputs.ref }}
    steps:
      - name: Parse /run-e2e comment
        id: parse
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const issue = context.payload.issue;

            if (!issue.pull_request) {
              core.setOutput('should_run', 'false');
              return;
            }

            if (!comment.startsWith('/run-e2e')) {
              core.setOutput('should_run', 'false');
              return;
            }
            const args = comment.replace(/^\/run-e2e\s*/i, '').toLowerCase().split(/\s+/).filter(Boolean);

            const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(permLevel.permission)) {
              core.setOutput('should_run', 'false');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue.number,
            });

            const platforms = { android: 'none', ios: 'none', web: 'none' };
            if (args.length === 0 || args.includes('all')) {
              platforms.android = 'all';
              platforms.ios = 'all';
              platforms.web = 'all';
            } else {
              for (const arg of args) {
                const [name, devices] = arg.split(':');
                if (name in platforms) {
                  platforms[name] = devices || 'all';
                }
              }
            }

            core.setOutput('should_run', 'true');
            core.setOutput('android', platforms.android);
            core.setOutput('ios', platforms.ios);
            core.setOutput('web', platforms.web);
            core.setOutput('ref', pr.head.sha);

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

  run-e2e:
    name: Run E2E Tests
    needs: [parse-comment]
    if: needs.parse-comment.outputs.should_run == 'true'
    uses: ./.github/workflows/e2e-tests.yml
    with:
      android: ${{ needs.parse-comment.outputs.android }}
      ios: ${{ needs.parse-comment.outputs.ios }}
      web: ${{ needs.parse-comment.outputs.web }}
      ref: ${{ needs.parse-comment.outputs.ref }}
      parallel: true
    secrets: inherit
