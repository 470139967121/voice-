name: SonarCloud Analysis

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        type: string
        required: true

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Run Express API tests with coverage
        run: |
          cd express-api && npm ci
          npx jest --coverage --coverageReporters=lcov || true

      - name: Install SonarCloud CLI
        run: |
          curl -sL https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux-x64.zip -o sonar-scanner.zip
          unzip -q sonar-scanner.zip
          echo "$PWD/sonar-scanner-6.2.1.4610-linux-x64/bin" >> "$GITHUB_PATH"

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=ShydenMcM_ShyTalk \
            -Dsonar.organization=shydenmcm \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.sources=shared/src/commonMain/kotlin,shared/src/androidMain/kotlin,express-api/src \
            -Dsonar.tests=shared/src/commonTest/kotlin,shared/src/jvmTest/kotlin,express-api/tests \
            -Dsonar.javascript.lcov.reportPaths=express-api/coverage/lcov.info \
            -Dsonar.exclusions="**/build/**,**/node_modules/**,**/*.json,**/composeResources/**" \
            -Dsonar.sourceEncoding=UTF-8
