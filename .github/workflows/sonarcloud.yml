name: SonarCloud Analysis

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        type: string
        required: true
      app_changed:
        description: 'Whether Kotlin/Android source changed'
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to analyse (default: main)'
        type: string
        default: 'main'
      app_changed:
        description: 'Include Kotlin/Android coverage'
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/setup-node

      - name: Run Express API tests with coverage
        run: |
          cd express-api && npm ci
          npx jest --coverage --coverageReporters=lcov || true

      - name: Download build outputs
        if: inputs.app_changed
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-outputs
        continue-on-error: true

      - uses: ./.github/actions/decode-google-services
        if: inputs.app_changed
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          prod-base64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}

      - name: Run Kotlin JVM tests (fallback if no build artifacts)
        if: inputs.app_changed
        run: |
          if [ -d "shared/build/test-results" ]; then
            echo "Build artifacts found — skipping rebuild"
          else
            echo "No build artifacts — running tests with coverage"
            ./gradlew :shared:jvmTest testDevDebugUnitTest jacocoDevDebugUnitTestReport || true
          fi

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew sonar -Dsonar.token=$SONAR_TOKEN -x :app:sonar

      - name: Skip SonarCloud (no token)
        if: env.SONAR_TOKEN == ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo "::warning::SonarCloud skipped — SONAR_TOKEN unavailable (Dependabot PR on public repo)"
