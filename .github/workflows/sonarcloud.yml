name: SonarCloud Analysis

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        type: string
        required: true
      app_changed:
        description: 'Whether Kotlin/Android source changed (skip JVM tests if false)'
        type: boolean
        default: true

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Run Express API tests with coverage
        run: |
          cd express-api && npm ci
          npx jest --coverage --coverageReporters=lcov || true

      - name: Decode google-services.json
        if: inputs.app_changed
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          if [ -n "$GOOGLE_SERVICES_DEV_BASE64" ]; then
            echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
            echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"placeholder"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.shyden.shytalk.dev"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/src/dev/google-services.json
            cp app/src/dev/google-services.json app/src/prod/google-services.json
            echo "::warning::Using placeholder google-services.json (secrets unavailable — Dependabot PR)"
          fi

      - name: Run Kotlin JVM tests for coverage reports
        if: inputs.app_changed
        run: ./gradlew :shared:jvmTest || true

      - name: Skip Kotlin tests (no app changes)
        if: "!inputs.app_changed"
        run: echo "::notice::Skipping Kotlin JVM tests — no app/shared changes detected"

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew sonar -Dsonar.token=$SONAR_TOKEN -x :app:sonar

      - name: Skip SonarCloud (no token)
        if: env.SONAR_TOKEN == ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo "::warning::SonarCloud skipped — SONAR_TOKEN unavailable (Dependabot PR on public repo)"
