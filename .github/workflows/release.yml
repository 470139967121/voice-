name: Release Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Build, Test & Deploy to Dev
  # ──────────────────────────────────────────────

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json for CI
        run: |
          DUMMY='{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:dummy","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"dummy"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:dummy2","android_client_info":{"package_name":"com.shyden.shytalk.dev"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}'
          mkdir -p app/src/dev app/src/prod
          echo "$DUMMY" > app/src/dev/google-services.json
          echo "$DUMMY" > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build devDebug
        run: ./gradlew assembleDevDebug

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest

      - name: Build devRelease APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleDevRelease

      - name: Publish unit test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit

      - name: Upload devDebug APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-debug-apk
          path: app/build/outputs/apk/dev/debug/*.apk

      - name: Upload devRelease APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-apk
          path: app/build/outputs/apk/dev/release/*.apk

  web-tests:
    name: Web Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          WEB_BASE_URL: https://dev.shytalk.shyden.co.uk

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Publish Playwright results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web Tests
          path: playwright-results.xml
          reporter: java-junit

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test, web-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Express API to London (dev)
        env:
          SSH_KEY: ${{ secrets.LONDON_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 145.241.224.13 >> ~/.ssh/known_hosts

          cd express-api
          tar czf /tmp/api.tar.gz --exclude='node_modules' --exclude='.env' .
          scp /tmp/api.tar.gz ubuntu@145.241.224.13:/tmp/
          ssh ubuntu@145.241.224.13 "cd ~/express-api && tar xzf /tmp/api.tar.gz && npm install --production && pm2 restart shytalk-api"

      - name: Verify dev API health
        run: |
          sleep 5
          curl -sf https://dev-api.shytalk.shyden.co.uk/api/health

      - name: Deploy web to dev site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEV_FIREBASE_API_KEY: ${{ secrets.DEV_FIREBASE_API_KEY }}
        run: |
          sed "s/<DEV_FIREBASE_API_KEY>/$DEV_FIREBASE_API_KEY/" public/admin/config.dev.example.js > public/admin/config.js
          npx wrangler pages deploy public --project-name shytalk-site-dev

      - name: Download devRelease APK
        uses: actions/download-artifact@v4
        with:
          name: dev-release-apk
          path: /tmp/dev-release-apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: "1:881846974606:android:fdcefe4da94d82718e31df"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          groups: internal-testers
          file: /tmp/dev-release-apk/app-dev-release.apk
          releaseNotes: "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

  # ──────────────────────────────────────────────
  # Stage 2: Approval Gate
  # ──────────────────────────────────────────────

  approve-production:
    name: Approve Production Release
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    needs: deploy-dev
    environment: production
    steps:
      - run: echo "Production release approved — running E2E tests next"

  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (dev environment only)
  # ──────────────────────────────────────────────

  e2e-tests:
    name: E2E Tests (${{ matrix.device }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: approve-production
    strategy:
      fail-fast: true
      matrix:
        device:
          - pixel4a
          - pixel8
          - pixel9ProXL
          - pixelTablet
        include:
          - device: pixel4a
            api-level: 34
            target: aosp_atd
            profile: pixel_4a
          - device: pixel8
            api-level: 34
            target: aosp_atd
            profile: pixel_8
          - device: pixel9ProXL
            api-level: 34
            target: aosp_atd
            profile: pixel_9_pro_xl
          - device: pixelTablet
            api-level: 34
            target: aosp_atd
            profile: pixel_tablet
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json for CI
        run: |
          DUMMY='{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:dummy","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"dummy"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:dummy2","android_client_info":{"package_name":"com.shyden.shytalk.dev"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}'
          mkdir -p app/src/dev app/src/prod
          echo "$DUMMY" > app/src/dev/google-services.json
          echo "$DUMMY" > app/src/prod/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on ${{ matrix.device }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          profile: ${{ matrix.profile }}
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDevDebugAndroidTest

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.device }}
          path: app/build/reports/androidTests/connected/

      - name: Publish E2E test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests (${{ matrix.device }})
          path: '**/build/outputs/androidTest-results/connected/**/TEST-*.xml'
          reporter: java-junit

  # ──────────────────────────────────────────────
  # Stage 4: Production Release
  # ──────────────────────────────────────────────

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json for CI
        run: |
          DUMMY='{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:dummy","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"dummy"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:dummy2","android_client_info":{"package_name":"com.shyden.shytalk.dev"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}'
          mkdir -p app/src/dev app/src/prod
          echo "$DUMMY" > app/src/dev/google-services.json
          echo "$DUMMY" > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build prodRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleProdRelease bundleProdRelease

      - name: Run prod smoke tests
        run: ./gradlew testProdReleaseUnitTest

      - name: Archive previous API version
        env:
          SSH_KEY: ${{ secrets.SINGAPORE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 213.35.98.160 >> ~/.ssh/known_hosts
          ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar czf /tmp/api-previous.tar.gz --exclude='node_modules' --exclude='.env' ."

      - name: Deploy Express API to Singapore (prod)
        run: |
          cd express-api
          tar czf /tmp/api.tar.gz --exclude='node_modules' --exclude='.env' .
          scp /tmp/api.tar.gz ubuntu@213.35.98.160:/tmp/
          ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar xzf /tmp/api.tar.gz && npm install --production && pm2 restart shytalk-api"

      - name: Verify prod API health
        run: |
          sleep 5
          curl -sf https://api.shytalk.shyden.co.uk/api/health

      # Upload to internal testing track (prod build for testers)
      - name: Upload to Play Store internal testing track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shyden.shytalk
          releaseFiles: app/build/outputs/bundle/prodRelease/*.aab
          track: internal
          status: draft

      - name: Deploy web to prod site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROD_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
        run: |
          sed "s/<PROD_FIREBASE_API_KEY>/$PROD_FIREBASE_API_KEY/" public/admin/config.example.js > public/admin/config.js
          npx wrangler pages deploy public --project-name shytalk-site

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --merge --auto

  # ──────────────────────────────────────────────
  # Stage 5 (SIMULATED): Promote to Production
  # ──────────────────────────────────────────────
  # TODO: When ready, replace this with actual Play Store promotion
  # from internal track → production track. This will require:
  #   1. A second approval gate (approve-public-release)
  #   2. Use r0adkll/upload-google-play with track: production
  #      and fromTrack: internal (promote, not re-upload)
  #
  # promote-to-production:
  #   name: Promote to Public Release
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 10
  #   needs: deploy-prod
  #   environment: public-release  # separate approval gate
  #   steps:
  #     - name: Promote internal → production on Play Store
  #       uses: r0adkll/upload-google-play@v1
  #       with:
  #         serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
  #         packageName: com.shyden.shytalk
  #         track: production
  #         fromTrack: internal
  #         status: completed

  # ──────────────────────────────────────────────
  # Alert (if prod deploy fails)
  # ──────────────────────────────────────────────

  alert-desync:
    name: Alert - Prod/Main Desync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-prod
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create critical issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh issue create \
            --title "CRITICAL: Production deployed but main not updated" \
            --label "critical,prod-desync" \
            --assignee "$PR_AUTHOR" \
            --body "## Production/Main Desync Alert

          **PR:** #${PR_NUMBER}
          **Branch:** ${HEAD_REF}
          **Deployed SHA:** ${HEAD_SHA}

          ### What happened
          Production was deployed successfully but the auto-merge to main failed.
          This means main does not match what is live in production.

          ### Immediate action required
          1. Check the PR for merge conflicts
          2. Resolve conflicts and merge manually
          3. Verify main matches the deployed SHA
          4. Close this issue once resolved"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "## CRITICAL: Production deployed but auto-merge failed. Main branch does not match production. See the created issue for resolution steps."
