  # ──────────────────────────────────────────────
  # Alert (if prod deploy fails after merge — Stage 6 failure)
  # ──────────────────────────────────────────────

  alert-desync:
    name: Alert - Prod Deploy Failed
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-prod, deploy-ios-prod]
    if: ${{ always() && (needs.deploy-prod.result == 'failure' || needs.deploy-ios-prod.result == 'failure') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create critical issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh issue create \
            --title "CRITICAL: Main updated but production deploy failed" \
            --label "critical,prod-desync" \
            --assignee "$PR_AUTHOR" \
            --body "## Production Deploy Failed

          **PR:** #${PR_NUMBER}
          **Branch:** ${HEAD_REF}
          **Merged SHA:** ${HEAD_SHA}

          ### What happened
          PR was merged to main but the production deployment failed.
          Main has new code that is not yet live in production.

          ### Immediate action required
          1. Check the deploy-prod job logs for the failure reason
          2. Fix the issue and re-deploy manually or via a new PR
          3. Verify production matches main
          4. Close this issue once resolved"
