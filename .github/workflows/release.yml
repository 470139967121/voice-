  #       run: |
  #         cd iosApp
  #         xcodebuild \
  #           -project iosApp.xcodeproj \
  #           -scheme iosApp \
  #           -sdk iphonesimulator \
  #           -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.os }}' \
  #           -configuration Debug \
  #           CODE_SIGNING_ALLOWED=NO \
  #           build-for-testing
  #
  #     - name: Run iOS UI tests on ${{ matrix.device }}
  #       run: |
  #         cd iosApp
  #         xcodebuild \
  #           -project iosApp.xcodeproj \
  #           -scheme iosApp \
  #           -sdk iphonesimulator \
  #           -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.os }}' \
  #           -configuration Debug \
  #           CODE_SIGNING_ALLOWED=NO \
  #           test-without-building
  #
