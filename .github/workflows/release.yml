  #   strategy:
  #     fail-fast: true
  #     matrix:
  #       device:
  #         - iPhone-16
  #         - iPhone-16-Pro-Max
  #         - iPad-Pro-13-inch-M4
  #       include:
  #         - device: iPhone-16
  #           simulator: "iPhone 16"
  #           os: "18.0"
  #         - device: iPhone-16-Pro-Max
  #           simulator: "iPhone 16 Pro Max"
  #           os: "18.0"
  #         - device: iPad-Pro-13-inch-M4
  #           simulator: "iPad Pro 13-inch (M4)"
  #           os: "18.0"
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Set up JDK 17
  #       uses: actions/setup-java@v4
  #       with:
  #         java-version: '17'
  #         distribution: 'temurin'
  #
  #     - name: Set up Gradle
  #       uses: gradle/actions/setup-gradle@v4
  #
