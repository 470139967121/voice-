  #         xcodebuild \
  #           -project iosApp.xcodeproj \
  #           -scheme iosApp \
  #           -sdk iphonesimulator \
  #           -destination 'platform=iOS Simulator,name=${{ matrix.simulator }},OS=${{ matrix.os }}' \
  #           -configuration Debug \
