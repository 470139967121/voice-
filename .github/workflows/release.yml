name: Release Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Build, Test & Deploy to Dev
  # ──────────────────────────────────────────────

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          GOOGLE_SERVICES_PROD_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_PROD_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Run unit tests and build devRelease APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: |
          ./gradlew testDevDebugUnitTest assembleDevRelease --parallel || \
          ./gradlew testDevDebugUnitTest

      - name: Publish unit test report
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          check_name: Unit Tests
          files: '**/build/test-results/**/TEST-*.xml'

      - name: Upload devRelease APK
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dev-release-apk
          path: app/build/outputs/apk/dev/release/*.apk

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Build iOS app for simulator
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  web-tests:
    name: Web Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          WEB_BASE_URL: https://dev.shytalk.shyden.co.uk

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Publish Playwright results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          check_name: Web Tests
          files: playwright-results.xml

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test, web-tests, ios-build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install deploy tools
        run: npm install -g wrangler firebase-tools

      - name: Deploy Express API to London (dev)
        env:
          SSH_KEY: ${{ secrets.LONDON_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 145.241.224.13 >> ~/.ssh/known_hosts

          cd express-api
          tar czf /tmp/api.tar.gz --exclude='node_modules' --exclude='.env' .
          scp /tmp/api.tar.gz ubuntu@145.241.224.13:/tmp/
          ssh ubuntu@145.241.224.13 "cd ~/express-api && tar xzf /tmp/api.tar.gz && npm install --omit=dev && pm2 restart shytalk-api"

      - name: Verify dev API health
        run: |
          for i in 1 2 3 4 5; do
            sleep 5
            if curl -sf https://dev-api.shytalk.shyden.co.uk/api/health; then exit 0; fi
            echo "Health check attempt $i failed, retrying..."
          done
          echo "Dev API health check failed after 5 attempts"
          exit 1

      - name: Deploy web to dev site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '9315582c39b627dca58dfa83602db385'
          DEV_FIREBASE_API_KEY: ${{ secrets.DEV_FIREBASE_API_KEY }}
        run: |
          sed "s|<DEV_FIREBASE_API_KEY>|$DEV_FIREBASE_API_KEY|" public/admin/config.dev.example.js > public/admin/config.js
          wrangler pages deploy public --project-name shytalk-site-dev

      - name: Deploy Firestore rules to dev
        env:
          FIREBASE_SERVICE_ACCOUNT_DEV: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_DEV" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          firebase deploy --only firestore:rules --project shytalk-dev --non-interactive
          rm /tmp/firebase-sa.json

      - name: Deploy RTDB rules to dev
        env:
          FIREBASE_SERVICE_ACCOUNT_DEV: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_DEV" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          firebase deploy --only database --project shytalk-dev --non-interactive
          rm /tmp/firebase-sa.json

      - name: Download devRelease APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dev-release-apk
          path: /tmp/dev-release-apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@bd494989dd4bec0343f78adee87fe66e48279ad6 # v1
        with:
          appId: "1:881846974606:android:fdcefe4da94d82718e31df"
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          groups: internal-testers
          file: /tmp/dev-release-apk/app-dev-release.apk
          releaseNotes: "PR #${{ github.event.pull_request.number }}"

  # ──────────────────────────────────────────────
  # Stage 2: Approval Gate
  # ──────────────────────────────────────────────

  approve-production:
    name: Approve Production Release
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    needs: deploy-dev
    environment: production
    steps:
      - run: echo "Production release approved — running E2E tests next"

  # ──────────────────────────────────────────────
  # Stage 3: E2E Tests (dev environment only)
  # ──────────────────────────────────────────────

  e2e-tests:
    name: E2E Tests (${{ matrix.device }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: approve-production
    strategy:
      fail-fast: true
      matrix:
        device:
          - pixel4a
          - pixel8
          - pixel9ProXL
          - pixelTablet
        include:
          - device: pixel4a
            api-level: 34
            target: aosp_atd
            profile: pixel_4a
          - device: pixel8
            api-level: 34
            target: aosp_atd
            profile: pixel_8
          - device: pixel9ProXL
            api-level: 34
            target: aosp_atd
            profile: pixel_9_pro_xl
          - device: pixelTablet
            api-level: 34
            target: aosp_atd
            profile: pixel_tablet
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          GOOGLE_SERVICES_PROD_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_PROD_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on ${{ matrix.device }}
        uses: reactivecircus/android-emulator-runner@9125fe764b516df676e33c5e6df011c6f375ef88 # v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          profile: ${{ matrix.profile }}
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDevDebugAndroidTest

      - name: Upload E2E test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: e2e-results-${{ matrix.device }}
          path: app/build/reports/androidTests/connected/

      - name: Publish E2E test report
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          check_name: E2E Tests (${{ matrix.device }})
          files: '**/build/outputs/androidTest-results/connected/**/TEST-*.xml'

  # TODO: iOS E2E tests — enable once iOS app has real screens and UI test targets
  # ios-e2e-tests:
  #   name: iOS E2E Tests (${{ matrix.device }})
  #   runs-on: macos-latest
