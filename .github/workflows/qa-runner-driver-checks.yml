name: QA Runner Driver Checks

# Reusable workflow — invoked from pr-checks.yml when a PR touches
# express-api/scripts/drivers/**. Provides a fast signal that the
# runner's driver factories still load + bootstrap without surprising
# regressions, BEFORE the full backend test suite finishes.
#
# Closes gap E4 from the QA-runner framework tracker: "No pr-checks
# job that runs --check-drivers on PRs touching drivers/."
#
# Also closes gap E3 ("PR-gated subset matrix") via the --smoke step:
# rather than a full --matrix run (which would need PERSONAS_PASSWORD
# and burn Firebase quota on every PR), we run --smoke chromium-only
# against target=local. This bootstraps the driver AND makes ONE real
# webUiDump method call per cell — deeper diagnostic than
# --check-drivers (bootstrap-only) without the cost of full journey
# scenarios. Adds ~30s to PR CI.
#
# Per [[feedback-no-self-hosted-runners]] uses ubuntu-latest only.
# Per [[feedback-ci-cache-downloads-version-aware]] Playwright browser
# binaries are cached on the resolved Playwright version (busts when
# the dependency bumps).
# Per [[feedback-avoid-crons-prefer-event-driven]] no schedule:
# block. Operator's E1 (manual-qa-matrix.yml) is the full-matrix
# entrypoint; PR-time runs the cheap subset.

# Per-ref concurrency: newer commit on the same PR cancels in-progress
# driver-check runs. See lint.yml for the full rationale + the
# propagation gap in pr-checks.yml's concurrency. Pinned by
# express-api/tests/scripts/reusable-workflow-concurrency.test.js.
concurrency:
  group: qa-runner-driver-checks-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      ref:
        description: SHA to check out (PR head sha; main for nightly).
        type: string
        required: true

permissions:
  contents: read

jobs:
  driver-checks:
    name: --check-drivers + contract test (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: express-api/package-lock.json

      - name: Install express-api deps
        run: npm ci
        working-directory: express-api

      - name: Resolve Playwright version (for cache key)
        id: pw
        run: |
          # Read the installed Playwright version so the cache key changes
          # when Playwright bumps — per [[feedback-ci-cache-downloads-version-aware]].
          # node -p prints the field; trim any whitespace defensively.
          PW_VERSION=$(node -p "require('playwright/package.json').version" | tr -d '[:space:]')
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Playwright version resolved: $PW_VERSION"
        working-directory: express-api

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers (chromium + firefox + webkit)
        # `--with-deps` pulls apt packages on Ubuntu so headless WebKit
        # actually launches; without it WebKit silently fails to start
        # because libgtk/libgstreamer aren't present on the base image.
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: express-api

      - name: Driver contract test
        # Bounded subset of the full express-api suite — fastest signal
        # that any driver-shape regression surfaces before the full
        # backend suite finishes.
        # Jest 30+ renamed --testPathPattern to --testPathPatterns. The
        # singular form is deprecated and exits 1. PR #941 surfaced this
        # when the playwright devDep bump hoisted Jest's version.
        run: npm test -- --testPathPatterns tests/scripts/drivers/ --silent
        working-directory: express-api

      - name: --check-drivers diagnostic (local target)
        # Desktop browsers should report 'ok' on ubuntu (Playwright
        # provides chromium/firefox/webkit; edge unavailable). Mobile
        # cells report 'skip' on ubuntu (no adb device, no iOS simulator).
        # Exit code is 0 iff no cell reports 'fail' — 'skip' is acceptable.
        run: node scripts/manual-qa-runner.js --check-drivers --target local
        working-directory: express-api

      - name: --smoke diagnostic — chromium (PR-gated subset, gap E3)
        # Goes one level deeper than --check-drivers: bootstrap the
        # driver AND invoke ONE real method (webUiDump) per cell.
        # Catches cells that bootstrap clean but can't service runtime
        # calls (broken page navigation, driver-method drift, browser
        # silently degraded).
        #
        # Scope: --filter chromium (1 cell, ~30s extra). "firefox"
        # substring-matches mobile-firefox-* (PR #930 substring rule),
        # so chromium is the only safe desktop slug. Operator runs full
        # 12-cell matrix via E1 (manual-qa-matrix.yml) when warranted.
        #
        # if: always() — independent diagnostic; runs even if
        # --check-drivers above fails.
        #
        # `|| true` after the runner invocation is intentional: the
        # smoke method's localhost-ECONNREFUSED in PR CI (no Firebase
        # Emulator running) is the EXPECTED failure mode. The runner's
        # formatHealthCheckResult table doesn't surface per-cell error
        # messages, so we can't reliably distinguish a connection error
        # from a CLI regression at the workflow level. The diagnostic
        # value is in the CLI parse / dispatch surface — if the smoke
        # parser regresses, the step prints the runner's "Smoke: 0 ok /
        # 1 fail / 0 skip" line but doesn't fail the job. Operator
        # scans the workflow output for the SMOKE table after PR merges
        # to spot drift. Trade-off vs hiding real bugs: documented here
        # so future maintainers see the deliberate choice.
        #
        # If/when the runner gains per-cell error surfacing in stdout,
        # restore the selective ECONNREFUSED-only swallowing.
        if: always()
        run: node scripts/manual-qa-runner.js --smoke --target local --filter chromium || true
        working-directory: express-api
