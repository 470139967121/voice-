name: iOS Tests

on:
  workflow_call:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test (default: main)'
        type: string
        default: 'main'

permissions:
  contents: read

# Only one iOS test run at a time — prevents simulator resource contention
concurrency:
  group: ios-tests
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve inputs into device matrix ────────────────────────
  resolve-inputs:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_ios: ${{ steps.resolve.outputs.run_ios }}
      ios_matrix: ${{ steps.resolve.outputs.ios_matrix }}
      parallel: ${{ steps.resolve.outputs.parallel }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve platforms, devices, and ref
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const IOS_ALL = [
              { 'ios-version': '16.4', 'form-factor': 'iphone', simulator: 'iPhone 14' },
              { 'ios-version': '16.4', 'form-factor': 'ipad', simulator: 'iPad (10th generation)' },
              { 'ios-version': '17.5', 'form-factor': 'iphone', simulator: 'iPhone 15' },
              { 'ios-version': '17.5', 'form-factor': 'ipad', simulator: 'iPad Air (M2)' },
              { 'ios-version': '18.1', 'form-factor': 'iphone', simulator: 'iPhone 16' },
              { 'ios-version': '18.1', 'form-factor': 'ipad', simulator: 'iPad Air (M3)' },
            ];

            const ios = '${{ inputs.ios }}' || 'all';
            const parallel = '${{ inputs.parallel }}' !== 'false';
            const ref = '${{ inputs.ref }}' || context.sha;

            function filter(input, catalog, keyFn) {
              if (input === 'none' || input === 'false') return [];
              if (input === 'all' || input === 'true') return catalog;
              const selected = input.split(',').map(s => s.trim().toLowerCase());
              return catalog.filter(item => selected.includes(keyFn(item)));
            }

            const iosMatrix = filter(ios, IOS_ALL, d => `${d['ios-version']}-${d['form-factor']}`);

            core.setOutput('ref', ref);
            core.setOutput('parallel', String(parallel));
            core.setOutput('run_ios', String(iosMatrix.length > 0));
            core.setOutput('ios_matrix', JSON.stringify({ include: iosMatrix }));

            console.log(`iOS: ${iosMatrix.length} devices`);

  # ── Build iOS test bundle ─────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true'
    runs-on: macos-15
    # Bumped 2026-05-22 from 30 → 60. PR #714 was the first iOS-touching
    # PR after PR #708 enabled iOS E2E gating; its build-ios run
    # cancelled at exactly 30:00. Cold K/N compile alone takes 24-29
    # min on macos-15; with pod install + xcodebuild build-for-testing
    # on top, 30 is below the floor. 60 gives ~15 min headroom over the
    # observed worst case. Pinned by
    # tests/scripts/ios-tests-build-cache.test.js.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          include-local: 'true'

      # Mirror of deploy-dev.yml's `~/.konan` cache step (added by
      # PR #690). Without this, every iOS E2E run on a fresh macos-15
      # VM re-downloads the Kotlin/Native toolchain (~hundreds of MB)
      # — a few minutes that compound on top of the K/N compile.
      # Cache key uses the gradle versions-catalog hash so a Kotlin
      # version bump correctly invalidates; restore-keys provide
      # partial warmth on bumps.
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Check for iOS test targets
        id: check-tests
        run: |
          if grep -rq 'XCTestCase\|import XCTest' iosApp/ 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No iOS test targets found. Skipping iOS E2E tests."
          fi

      - name: Build shared KMP framework for iOS Simulator
        if: steps.check-tests.outputs.has_tests == 'true'
        # --max-workers=1 — see deploy-dev.yml's matching step. The KMP
        # plugin can deadlock on parallel K/N link tasks under macOS
        # runner memory pressure; serializing is safer than fast.
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --max-workers=1

      # Phase 3.2 pbxproj-mutation idempotency check. MUST run BEFORE
      # `Install CocoaPods` — `pod install` rewrites the pbxproj by
      # adding baseConfigurationReference entries for Pods-iosApp.*
      # xcconfigs onto every target-level config (including
      # Debug-Local/Release-Local). My Phase 3.2 contract asserts
      # those target-level Local configs have NO base reference
      # (Phase 3.4 scope). Running this test AFTER pod install reads
      # the mutated state and fails those assertions.
      #
      # Explicit `gem install xcodeproj` because we're now BEFORE
      # pod install (which would otherwise pull xcodeproj as a
      # transitive dep). The runner ships with Ruby; gem install is
      # ~5s.
      #
      # NO `if:` guard — the step's precondition is "ruby+xcodeproj
      # available", which is true on macos-15 after the explicit
      # gem install below. Inheriting the `has_tests` guard would
      # silently skip this check if XCTest targets are ever removed
      # (Round 3 I-1 review fix).
      - name: Verify pbxproj-mutation script idempotency
        run: |
          gem install --user-install xcodeproj
          cd express-api && \
          npx jest tests/scripts/ios-local-configurations.test.js

      - name: Install CocoaPods
        if: steps.check-tests.outputs.has_tests == 'true'
        run: cd iosApp && pod install

      - name: Build iOS app for testing
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          xcodebuild build-for-testing \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test bundle
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/
          retention-days: 3

    outputs:
      has_tests: ${{ steps.check-tests.outputs.has_tests }}

  # ── iOS E2E test matrix ───────────────────────────────────────
  test-ios:
    name: "iOS E2E (iOS ${{ matrix.ios-version }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs, build-ios]
    if: always() && needs.build-ios.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true' && needs.build-ios.outputs.has_tests == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.ios_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Download iOS test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/

      - name: Install iOS ${{ matrix.ios-version }} simulator runtime
        run: |
          set -euo pipefail
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')"
          if xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Runtime $RUNTIME_ID already installed"
          elif xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.ios-version }}"; then
            echo "Installed iOS ${{ matrix.ios-version }} runtime"
          else
            echo "::error::Could not install iOS ${{ matrix.ios-version }} runtime via -buildVersion. Check Xcode version on runner."
            xcrun simctl list runtimes
            exit 1
          fi
          # Verify it's now actually present before the next step tries to use it.
          # Don't fall back to unversioned `-downloadPlatform iOS` — if the matrix
          # asked for a specific version, getting a different one is a silent regression.
          if ! xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "::error::Runtime $RUNTIME_ID still not installed after download attempt"
            xcrun simctl list runtimes
            exit 1
          fi

      - name: Boot simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl create "test-device" \
            "${{ matrix.simulator }}" \
            "com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Run iOS E2E tests
        run: |
          xcodebuild test-without-building \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/ios-results/result.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ios-results-${{ matrix.ios-version }}-${{ matrix.form-factor }}
          path: build/ios-results/
          retention-days: 14

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ steps.sim.outputs.device_id }}" || true

  # ── Summary ──────────────────────────────────────────────────
  ios-summary:
    name: iOS Summary
    needs: [resolve-inputs, test-ios]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          echo "## iOS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          IOS="${{ needs.test-ios.result }}"

          echo "- iOS E2E: $IOS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$IOS" != "success" ] && [ "$IOS" != "skipped" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**iOS tests failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
