name: iOS Tests

on:
  workflow_call:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test (default: main)'
        type: string
        default: 'main'

permissions:
  contents: read

# Only one iOS test run at a time — prevents simulator resource contention
concurrency:
  group: ios-tests
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve inputs into device matrix ────────────────────────
  resolve-inputs:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_ios: ${{ steps.resolve.outputs.run_ios }}
      ios_matrix: ${{ steps.resolve.outputs.ios_matrix }}
      parallel: ${{ steps.resolve.outputs.parallel }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve platforms, devices, and ref
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            // Deployment target is iOS 18.0 (#850): the app cannot install on
            // pre-18 simulators — `test-without-building` reports "Unable to
            // find a destination matching the provided destination specifier"
            // for 16.4 / 17.5. So the matrix tests only >= 18.0: the near-floor
            // 18.1 (iphone + ipad) plus the latest 26.2. Re-add older rows only
            // if the deployment target is ever lowered below them.
            const IOS_ALL = [
              { 'ios-version': '18.1', 'form-factor': 'iphone', simulator: 'iPhone 16' },
              { 'ios-version': '18.1', 'form-factor': 'ipad', simulator: 'iPad Air (M3)' },
              { 'ios-version': '26.2', 'form-factor': 'iphone', simulator: 'iPhone 17' },
            ];

            const ios = '${{ inputs.ios }}' || 'all';
            const parallel = '${{ inputs.parallel }}' !== 'false';
            const ref = '${{ inputs.ref }}' || context.sha;

            function filter(input, catalog, keyFn) {
              if (input === 'none' || input === 'false') return [];
              if (input === 'all' || input === 'true') return catalog;
              const selected = input.split(',').map(s => s.trim().toLowerCase());
              return catalog.filter(item => selected.includes(keyFn(item)));
            }

            const iosMatrix = filter(ios, IOS_ALL, d => `${d['ios-version']}-${d['form-factor']}`);

            core.setOutput('ref', ref);
            core.setOutput('parallel', String(parallel));
            core.setOutput('run_ios', String(iosMatrix.length > 0));
            core.setOutput('ios_matrix', JSON.stringify({ include: iosMatrix }));

            console.log(`iOS: ${iosMatrix.length} devices`);

  # ── Build iOS test bundle ─────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true'
    runs-on: macos-15
    # Bumped 2026-05-22 from 30 → 60 (PR #714 cancelled at 30:00 exactly).
    # Bumped 2026-05-29 from 60 → 90 (PR #865 cancelled at 60:00 exactly;
    # iOS Build duration crept from ~50 min on PR #864 (PR F) to the full
    # 60-min cap on PR #865). Cold K/N compile = 24-29 min on macos-15;
    # with pod install + Xcode build-for-testing + upload-artifact + cache
    # post-steps, the worst-case has been creeping up. 90 gives ~30 min
    # headroom over the most-recent observed worst case, restoring the
    # PR #714-era safety margin. Pinned by
    # tests/scripts/ios-tests-build-cache.test.js (asserts ≥60).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      # The macos-15 runner image ships with BOTH Xcode 16.x (default)
      # and Xcode 26.x pre-installed. The default `xcode-select`
      # points at 16.4, which caps iOS testing at 18.5. iOS 26.2 (the
      # latest simulator runtime) is only available inside Xcode 26.x.
      # Switching to Xcode 26.3 at the START of build-ios means the
      # produced .xctest bundle and KMP framework are built against
      # the latest SDK — backward-compatible to iOS 16.0 deployment
      # target, but ready for iOS 26.2 simulators in test-ios.
      - name: Select Xcode 26.3
        id: xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version
          # Capture the Xcode build number for version-aware caching of the
          # Metal toolchain below: a newer Xcode → new cache key → re-download.
          echo "build=$(xcodebuild -version | awk '/Build version/{print $3}')" >> "$GITHUB_OUTPUT"

      # Since Xcode 26 the Metal toolchain is an optional ~700MB component that
      # is NOT bundled in the macos runner image (actions/runner-images#13014).
      # Its absence makes the linker warn "search path
      # '.../Metal.xctoolchain/usr/lib/swift/iphonesimulator' not found" (6× in
      # Build iOS). We install it — a real fix, not a suppression. The exported
      # bundle is cached keyed on the Xcode build, so it downloads once per
      # Xcode version and an Xcode bump re-fetches the matching toolchain.
      - name: Cache Metal toolchain bundle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/metal-toolchain-export
          key: metal-toolchain-${{ runner.os }}-xcode-${{ steps.xcode.outputs.build }}

      - name: Install Metal toolchain
        run: |
          if ls /tmp/metal-toolchain-export/*.exportedBundle >/dev/null 2>&1; then
            echo "↻ Importing Metal toolchain from cache"
            xcodebuild -importComponent MetalToolchain -importPath /tmp/metal-toolchain-export/*.exportedBundle
          else
            echo "⬇ Downloading Metal toolchain (~700MB; cached per Xcode build hereafter)"
            mkdir -p /tmp/metal-toolchain-export
            # -downloadComponent installs the toolchain directly AND exports the
            # bundle for caching — a separate -importComponent here fails with
            # "Asset is already installed". Import is only needed on a cache
            # HIT (above), where no download ran.
            xcodebuild -downloadComponent MetalToolchain -exportPath /tmp/metal-toolchain-export/
          fi
          xcodebuild -showComponent MetalToolchain || true

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          include-local: 'true'

      # Mirror of deploy-dev.yml's `~/.konan` cache step (added by
      # PR #690). Without this, every iOS E2E run on a fresh macos-15
      # VM re-downloads the Kotlin/Native toolchain (~hundreds of MB)
      # — a few minutes that compound on top of the K/N compile.
      # Cache key uses the gradle versions-catalog hash so a Kotlin
      # version bump correctly invalidates; restore-keys provide
      # partial warmth on bumps.
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      # CocoaPods spec-repo cache. Mirrors deploy-dev's pattern but
      # scoped to ~/.cocoapods/repos — the master spec mirror
      # (~1GB) that pod install hydrates from. Without this, every
      # cold runner re-clones the trunk over slow network (~1-3 min
      # before any actual pod download begins).
      - name: Cache CocoaPods spec repos (~/.cocoapods/repos)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cocoapods/repos
          key: cocoapods-repos-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            cocoapods-repos-${{ runner.os }}-

      # iosApp/Pods/ cache. Single-largest cold-cache cost in the
      # build (gRPC-Core compiles ~1000 files; Firebase Firestore
      # ~600 more). Keyed on Podfile.lock — when deps don't change,
      # warm hit means `pod install` is a no-op verification.
      # Restore-keys provide partial warmth on Podfile changes.
      - name: Cache iosApp/Pods
        id: pods-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: iosApp/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('iosApp/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      # Xcode DerivedData cache. Project-local path (NOT the default
      # ~/Library/Developer/Xcode/DerivedData) per the xcodebuild
      # `-derivedDataPath build/ios-derived-data` flag below. Without
      # this, xcodebuild re-compiles every Pods + KMP framework object
      # from scratch (~15-20 min cold).
      #
      # Key components — DO NOT use `iosApp/**` glob: the iosApp/Pods
      # cache step (above) restores Pods files into iosApp/Pods/ BEFORE
      # this hashFiles runs, and Pods generated files would then poison
      # the key on every warm-Pods run (guaranteed DerivedData miss).
      # Instead, list the specific committed dirs/files under iosApp/
      # that legitimately invalidate DerivedData when changed:
      #   - iosApp/iosApp/**             — Swift sources of the app target
      #   - iosApp/iosAppTests/**        — Swift sources of the tests target
      #   - iosApp/iosAppUITests/**      — Swift sources of the UI tests target
      #   - iosApp/iosApp.xcodeproj/**   — project file changes
      #   - iosApp/Podfile.lock          — pod version pin
      #   - iosApp/Configurations/**     — xcconfigs
      # Then the KMP simulator framework hash so KMP-source changes
      # invalidate too.
      - name: Cache Xcode DerivedData (build/ios-derived-data)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/ios-derived-data
          key: ios-derived-${{ runner.os }}-${{ hashFiles('iosApp/iosApp/**', 'iosApp/iosAppTests/**', 'iosApp/iosAppUITests/**', 'iosApp/iosApp.xcodeproj/**', 'iosApp/Podfile.lock', 'iosApp/Configurations/**', 'shared/build/bin/iosSimulatorArm64/**') }}
          restore-keys: |
            ios-derived-${{ runner.os }}-

      # Swift Package Manager cloned-packages cache. xcodebuild's
      # `-clonedSourcePackagesDirPath build/ios-spm-packages` flag
      # below stages SPM clones here instead of inside DerivedData.
      # Caching them keeps Package.resolved hits warm across runs
      # so xcodebuild doesn't re-clone (e.g. github.com/firebase/...
      # ~400MB) every build.
      - name: Cache SwiftPM packages (build/ios-spm-packages)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/ios-spm-packages
          key: ios-spm-${{ runner.os }}-${{ hashFiles('iosApp/**/Package.resolved', 'iosApp/**/Package.swift') }}
          restore-keys: |
            ios-spm-${{ runner.os }}-

      - name: Check for iOS test targets
        id: check-tests
        run: |
          if grep -rq 'XCTestCase\|import XCTest' iosApp/ 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No iOS test targets found. Skipping iOS E2E tests."
          fi

      - name: Build shared KMP framework for iOS Simulator
        if: steps.check-tests.outputs.has_tests == 'true'
        # --max-workers=1 — see deploy-dev.yml's matching step. The KMP
        # plugin can deadlock on parallel K/N link tasks under macOS
        # runner memory pressure; serializing is safer than fast.
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 --max-workers=1

      # Phase 3.2 pbxproj-mutation idempotency check. MUST run BEFORE
      # `Install CocoaPods` — `pod install` rewrites the pbxproj by
      # adding baseConfigurationReference entries for Pods-iosApp.*
      # xcconfigs onto every target-level config (including
      # Debug-Local/Release-Local). My Phase 3.2 contract asserts
      # those target-level Local configs have NO base reference
      # (Phase 3.4 scope). Running this test AFTER pod install reads
      # the mutated state and fails those assertions.
      #
      # Explicit `gem install xcodeproj` because we're now BEFORE
      # pod install (which would otherwise pull xcodeproj as a
      # transitive dep). The runner ships with Ruby; gem install is
      # ~5s.
      #
      # NO `if:` guard — the step's precondition is "ruby+xcodeproj
      # available", which is true on macos-15 after the explicit
      # gem install below. Inheriting the `has_tests` guard would
      # silently skip this check if XCTest targets are ever removed
      # (Round 3 I-1 review fix).
      - name: Verify pbxproj-mutation script idempotency
        working-directory: express-api
        # R4 review I-2: `gem install xcodeproj` (no --user-install)
        # is the standard form on macOS GitHub runners. The runner
        # user has write access to the system Ruby gem directory and
        # the gem becomes available via the standard $LOAD_PATH on
        # the next Ruby invocation. `--user-install` would place the
        # gem in `~/.gem/...` which (while still on Ruby's GEM_PATH)
        # adds a subtle correctness-vs-PATH mismatch if a later step
        # invokes a different Ruby.
        run: |
          gem install xcodeproj
          npx jest tests/scripts/ios-local-configurations.test.js

      - name: Install CocoaPods
        # Skip when iosApp/Pods/ cache hit AND Podfile.lock unchanged —
        # pods are already installed and the pbxproj already wired.
        # On miss (or new Podfile.lock), runs fresh `pod install`.
        #
        # --deployment enforces that the committed Podfile.lock is the
        # source of truth: pod install fails loudly on lock mismatch
        # instead of silently regenerating. Catches stale-lock bugs
        # before they corrupt the Pods cache.
        if: steps.check-tests.outputs.has_tests == 'true' && steps.pods-cache.outputs.cache-hit != 'true'
        run: cd iosApp && pod install --deployment

      # Pin contract for the iosAppTests CocoaPods integration. Runs
      # AFTER `pod install` so it reads the post-install pbxproj
      # state for baseConfigurationReference assertions. Must run
      # unconditionally on every iOS PR (no `has_tests` guard) — the
      # contract being pinned is `iosAppTests target's xcconfigs are
      # wired`, which is independent of whether tests exist for it.
      - name: Verify iosAppTests Pods integration (pin contract)
        working-directory: express-api
        run: npx jest tests/scripts/ios-pods-integration-pin.test.js

      - name: Build iOS app for testing
        if: steps.check-tests.outputs.has_tests == 'true'
        # `set -o pipefail` is REQUIRED so xcodebuild's non-zero exit
        # propagates through the tee pipe. Without it, tee always
        # exits 0 and a failed build looks successful at the step
        # level. `mkdir -p` is idempotent and must precede the pipe
        # because tee will refuse to create a file in a missing
        # directory.
        #
        # The build/ios-build-logs/ output is uploaded by the next
        # step (Upload xcodebuild logs) as the `ios-xcodebuild-logs`
        # workflow artifact so any future build failure is
        # downloadable via `gh run download <run-id> -n
        # ios-xcodebuild-logs`. GH Actions truncates inline logs on
        # long compiles (~48k lines hard limit on PR Checks UI), so
        # the artifact is the only reliable failure-debug surface.
        run: |
          set -o pipefail
          mkdir -p build/ios-build-logs
          # -quiet drops the per-file CpHeader / CompileC chatter (the
          #   noise that flooded the 48k log line ceiling and made the
          #   2026-05-24 failure invisible until the artifact was downloaded).
          #   Errors + warnings still surface. ~30% throughput improvement
          #   on log-bound builds.
          # -clonedSourcePackagesDirPath puts SwiftPM cloned packages in
          #   a cacheable location instead of inside DerivedData where
          #   they'd be cache-thrashed alongside build products.
          # -skipPackagePluginValidation + -skipMacroValidation skip the
          #   Xcode 26 trust prompts for build-time package plugins +
          #   Swift macros (~5-10s per launch on cold runner; we don't
          #   need interactive trust in CI).
          xcodebuild build-for-testing \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived-data \
            -clonedSourcePackagesDirPath build/ios-spm-packages \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build/ios-build-logs/xcodebuild-build-for-testing.log

      - name: Upload xcodebuild logs
        # `if: always()` is the load-bearing keyword. The whole point
        # of this artifact is debugging FAILURES. Without always(),
        # the upload only runs on green builds — exactly the opposite
        # of when the log matters. `if-no-files-found: error` defends
        # against the tee never receiving output (e.g. xcodebuild
        # crashed before producing any stdout).
        if: always() && steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-xcodebuild-logs
          path: build/ios-build-logs/
          if-no-files-found: error
          retention-days: 7

      - name: Upload iOS test bundle
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/
          retention-days: 3

    outputs:
      has_tests: ${{ steps.check-tests.outputs.has_tests }}

  # ── iOS E2E test matrix ───────────────────────────────────────
  test-ios:
    name: "iOS E2E (iOS ${{ matrix.ios-version }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs, build-ios]
    if: always() && needs.build-ios.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true' && needs.build-ios.outputs.has_tests == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.ios_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      # Match the build-ios Xcode selection. xcrun simctl uses the
      # ACTIVE Xcode's runtime catalog — without selecting 26.3 here,
      # iOS 26.2 simulators are invisible to `simctl list runtimes`
      # and `simctl create` for the matrix's 26.2 entry would fail.
      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Download iOS test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/

      - name: Install iOS ${{ matrix.ios-version }} simulator runtime
        run: |
          set -euo pipefail
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')"
          if xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Runtime $RUNTIME_ID already installed"
          elif xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.ios-version }}"; then
            echo "Installed iOS ${{ matrix.ios-version }} runtime"
          else
            echo "::error::Could not install iOS ${{ matrix.ios-version }} runtime via -buildVersion. Check Xcode version on runner."
            xcrun simctl list runtimes
            exit 1
          fi
          # Verify it's now actually present before the next step tries to use it.
          # Don't fall back to unversioned `-downloadPlatform iOS` — if the matrix
          # asked for a specific version, getting a different one is a silent regression.
          if ! xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "::error::Runtime $RUNTIME_ID still not installed after download attempt"
            xcrun simctl list runtimes
            exit 1
          fi

      - name: Boot simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl create "test-device" \
            "${{ matrix.simulator }}" \
            "com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Run iOS E2E tests
        run: |
          xcodebuild test-without-building \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/ios-results/result.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ios-results-${{ matrix.ios-version }}-${{ matrix.form-factor }}
          path: build/ios-results/
          retention-days: 14

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ steps.sim.outputs.device_id }}" || true

  # ── Summary ──────────────────────────────────────────────────
  ios-summary:
    name: iOS Summary
    needs: [resolve-inputs, test-ios]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          echo "## iOS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          IOS="${{ needs.test-ios.result }}"

          echo "- iOS E2E: $IOS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$IOS" != "success" ] && [ "$IOS" != "skipped" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**iOS tests failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
