name: iOS Tests

on:
  workflow_call:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true

permissions:
  contents: read

# Only one iOS test run at a time — prevents simulator resource contention
concurrency:
  group: ios-tests
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve inputs into device matrix ────────────────────────
  resolve-inputs:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_ios: ${{ steps.resolve.outputs.run_ios }}
      ios_matrix: ${{ steps.resolve.outputs.ios_matrix }}
      parallel: ${{ steps.resolve.outputs.parallel }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve platforms, devices, and ref
        id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const IOS_ALL = [
              { 'ios-version': '16.4', 'form-factor': 'iphone', simulator: 'iPhone 14' },
              { 'ios-version': '16.4', 'form-factor': 'ipad', simulator: 'iPad (10th generation)' },
              { 'ios-version': '17.5', 'form-factor': 'iphone', simulator: 'iPhone 15' },
              { 'ios-version': '17.5', 'form-factor': 'ipad', simulator: 'iPad Air (M2)' },
              { 'ios-version': '18.1', 'form-factor': 'iphone', simulator: 'iPhone 16' },
              { 'ios-version': '18.1', 'form-factor': 'ipad', simulator: 'iPad Air (M3)' },
            ];

            const ios = '${{ inputs.ios }}' || 'all';
            const parallel = '${{ inputs.parallel }}' !== 'false';
            const ref = '${{ inputs.ref }}' || context.sha;

            function filter(input, catalog, keyFn) {
              if (input === 'none' || input === 'false') return [];
              if (input === 'all' || input === 'true') return catalog;
              const selected = input.split(',').map(s => s.trim().toLowerCase());
              return catalog.filter(item => selected.includes(keyFn(item)));
            }

            const iosMatrix = filter(ios, IOS_ALL, d => `${d['ios-version']}-${d['form-factor']}`);

            core.setOutput('ref', ref);
            core.setOutput('parallel', String(parallel));
            core.setOutput('run_ios', String(iosMatrix.length > 0));
            core.setOutput('ios_matrix', JSON.stringify({ include: iosMatrix }));

            console.log(`iOS: ${iosMatrix.length} devices`);

  # ── Build iOS test bundle ─────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod app/src/local
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json
          echo '{"project_info":{"project_number":"0","project_id":"demo-shytalk"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"placeholder"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:local","android_client_info":{"package_name":"com.shyden.shytalk.local"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/src/local/google-services.json

      - name: Check for iOS test targets
        id: check-tests
        run: |
          if grep -rq 'XCTestCase\|import XCTest' iosApp/ 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No iOS test targets found. Skipping iOS E2E tests."
          fi

      - name: Build shared KMP framework for iOS Simulator
        if: steps.check-tests.outputs.has_tests == 'true'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app for testing
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          xcodebuild build-for-testing \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test bundle
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/
          retention-days: 3

    outputs:
      has_tests: ${{ steps.check-tests.outputs.has_tests }}

  # ── iOS E2E test matrix ───────────────────────────────────────
  test-ios:
    name: "iOS E2E (iOS ${{ matrix.ios-version }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs, build-ios]
    if: always() && needs.build-ios.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true' && needs.build-ios.outputs.has_tests == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.ios_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Download iOS test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/

      - name: Install iOS ${{ matrix.ios-version }} simulator runtime
        run: |
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')"
          if xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Runtime $RUNTIME_ID already installed"
          else
            xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.ios-version }}" 2>/dev/null || \
            xcodebuild -downloadPlatform iOS || \
            echo "::warning::Could not install iOS ${{ matrix.ios-version }} runtime."
          fi
          xcrun simctl list runtimes

      - name: Boot simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl create "test-device" \
            "${{ matrix.simulator }}" \
            "com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Run iOS E2E tests
        run: |
          xcodebuild test-without-building \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/ios-results/result.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: ios-results-${{ matrix.ios-version }}-${{ matrix.form-factor }}
          path: build/ios-results/
          retention-days: 14

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ steps.sim.outputs.device_id }}" || true

  # ── Summary ──────────────────────────────────────────────────
  ios-summary:
    name: iOS Summary
    needs: [resolve-inputs, test-ios]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          echo "## iOS Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          IOS="${{ needs.test-ios.result }}"

          echo "- iOS E2E: $IOS" >> "$GITHUB_STEP_SUMMARY"

          if [ "$IOS" != "success" ] && [ "$IOS" != "skipped" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**iOS tests failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
