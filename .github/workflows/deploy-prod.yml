name: Deploy To Prod
# Deploy a specific release tag to production

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to deploy (e.g. v0.55.0)'
        type: string
        required: true
      backend:
        description: 'Deploy Express API to prod'
        type: boolean
        default: true
      web:
        description: 'Deploy web to prod'
        type: boolean
        default: true
      android:
        description: 'Build + upload to Play Store'
        type: boolean
        default: true
      ios:
        description: 'Build + upload to App Store'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-release:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}
          fetch-depth: 0

      - name: Validate tag exists and is on main
        id: validate
        env:
          TAG: ${{ inputs.release-tag }}
        run: |
          if ! git tag -l "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG does not exist"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG" origin/main 2>/dev/null; then
            echo "::warning::Tag $TAG may not be on the main branch"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying release $TAG (version $VERSION)"

  # ── Build Android (shared by deploy + smoke test) ──────────
  build-android:
    name: Build Android
    needs: [validate-release]
    if: inputs.android
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          GOOGLE_SERVICES_PROD_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_PROD_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build prodRelease (AAB + APK) and prodDebug APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: ./gradlew assembleProdRelease bundleProdRelease assembleProdDebug --parallel

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-prod-release
          path: |
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/apk/prod/release/*.apk
            app/src/main/play/release-notes/
          retention-days: 3

      - name: Upload debug APK for smoke test
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: android-prod-debug
          path: app/build/outputs/apk/prod/debug/*.apk
          retention-days: 3

  # ── Deploy jobs ────────────────────────────────────────────
  deploy-backend-prod:
    name: Deploy Backend to Prod
    needs: [validate-release]
    if: inputs.backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install deploy tools
        run: npm install -g firebase-tools

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SINGAPORE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 213.35.98.160 >> ~/.ssh/known_hosts

      - name: Archive previous API version
        run: ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar czf /tmp/api-previous.tar.gz --exclude='node_modules' --exclude='.env' ."

      - name: Deploy Express API to Singapore (prod)
        run: |
          cd express-api
          tar czf /tmp/api.tar.gz --exclude='node_modules' --exclude='.env' .
          scp /tmp/api.tar.gz ubuntu@213.35.98.160:/tmp/
          ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar xzf /tmp/api.tar.gz && npm install --omit=dev && pm2 restart shytalk-api"

      - name: Verify prod API health
        run: |
          for i in 1 2 3 4 5; do
            sleep 5
            if curl -sf https://api.shytalk.shyden.co.uk/api/health; then exit 0; fi
            echo "Health check attempt $i failed, retrying..."
          done
          echo "Prod API health check failed after 5 attempts"
          exit 1

      - name: Deploy Firestore rules to prod
        env:
          FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_PROD" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          firebase deploy --only firestore:rules --project shytalk-7ba69 --non-interactive
          rm /tmp/firebase-sa.json

      - name: Deploy RTDB rules to prod
        env:
          FIREBASE_SERVICE_ACCOUNT_PROD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_PROD" > /tmp/firebase-sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json
          firebase deploy --only database --project shytalk-7ba69 --non-interactive
          rm /tmp/firebase-sa.json

  deploy-web-prod:
    name: Deploy Web to Prod
    needs: [validate-release]
    if: inputs.web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Install deploy tools
        run: npm install -g wrangler

      - name: Deploy web to prod site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '9315582c39b627dca58dfa83602db385'
          PROD_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
        run: |
          sed "s|<PROD_FIREBASE_API_KEY>|$PROD_FIREBASE_API_KEY|" public/admin/config.example.js > public/admin/config.js
          wrangler pages deploy public --project-name shytalk-site --branch main

  deploy-android-prod:
    name: Deploy Android to Play Store
    needs: [validate-release, build-android]
    if: inputs.android
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v7
        with:
          name: android-prod-release
          path: android-release

      - name: List downloaded artifacts
        run: find android-release -type f | head -20

      - name: Upload to Play Store internal testing track
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shyden.shytalk
          releaseFiles: android-release/build/outputs/bundle/prodRelease/*.aab
          track: internal
          status: completed
          releaseName: ${{ needs.validate-release.outputs.version }}
          whatsNewDirectory: android-release/src/main/play/release-notes

  deploy-ios-prod:
    name: Deploy iOS to App Store
    needs: [validate-release]
    if: inputs.ios
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-read-only: false

      - name: Install Apple API key
        env:
          APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Decode signing certificate and provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"
          PROFILE_UUID=$(/usr/bin/security cms -D -i "$PROFILE_PATH" 2>/dev/null | grep -A1 '<key>UUID</key>' | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

      - name: Select Xcode 26
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | head -1)
          if [ -z "$XCODE_26" ]; then
            echo "Available Xcode versions:"
            ls /Applications/Xcode*.app
            echo "::error::Xcode 26 not found on this runner"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_26/Contents/Developer"

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          GOOGLE_SERVICES_PROD_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_PROD_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Build KMP shared framework for iOS
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Build and archive iOS app
        run: |
          cd iosApp
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="ShyTalk App Store Distribution" \
            DEVELOPMENT_TEAM=F3XX4PM3MF \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd iosApp
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  # ── Smoke tests (after deploys) ────────────────────────────
  smoke-test-backend-web:
    name: Smoke Test (API + Web)
    needs: [validate-release, deploy-backend-prod, deploy-web-prod, deploy-android-prod, deploy-ios-prod]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      (needs.deploy-backend-prod.result == 'success' ||
       needs.deploy-web-prod.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify API health
        if: needs.deploy-backend-prod.result == 'success'
        run: |
          echo "=== API Health Check ==="
          HEALTH=$(curl -sf https://api.shytalk.shyden.co.uk/api/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "::error::Health check failed"; exit 1; }

      - name: Verify API endpoints respond
        if: needs.deploy-backend-prod.result == 'success'
        run: |
          echo "=== API Endpoint Checks ==="
          ERRORS=0
          for endpoint in "/api/health"; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://api.shytalk.shyden.co.uk${endpoint}")
            if [ "$STATUS" = "200" ]; then echo "OK: ${endpoint} → ${STATUS}"
            else echo "FAIL: ${endpoint} → ${STATUS}"; ERRORS=$((ERRORS + 1)); fi
          done
          for endpoint in "/api/users/me" "/api/rooms" "/api/conversations"; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://api.shytalk.shyden.co.uk${endpoint}")
            if [ "$STATUS" = "401" ]; then echo "OK: ${endpoint} → ${STATUS} (auth required)"
            elif [ "$STATUS" -ge 500 ]; then echo "FAIL: ${endpoint} → ${STATUS} (server error)"; ERRORS=$((ERRORS + 1))
            else echo "OK: ${endpoint} → ${STATUS}"; fi
          done
          for endpoint in "/api/admin/alerts" "/api/admin/banners"; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://api.shytalk.shyden.co.uk${endpoint}")
            if [ "$STATUS" -ge 500 ]; then echo "FAIL: ${endpoint} → ${STATUS}"; ERRORS=$((ERRORS + 1))
            else echo "OK: ${endpoint} → ${STATUS}"; fi
          done
          [ "$ERRORS" -eq 0 ] || { echo "::error::${ERRORS} endpoint(s) returned server errors"; exit 1; }
          echo "All API endpoints responding correctly"

      - name: Verify web landing page
        if: needs.deploy-web-prod.result == 'success'
        run: |
          echo "=== Web Landing Page ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://shytalk.shyden.co.uk")
          [ "$STATUS" = "200" ] || { echo "::error::Landing page returned ${STATUS}"; exit 1; }
          BODY=$(curl -sf "https://shytalk.shyden.co.uk")
          echo "$BODY" | grep -qi "shytalk" || { echo "::error::Missing ShyTalk content"; exit 1; }
          echo "Landing page OK"

      - name: Verify admin panel
        if: needs.deploy-web-prod.result == 'success'
        run: |
          echo "=== Admin Panel ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://shytalk.shyden.co.uk/admin/")
          [ "$STATUS" = "200" ] || { echo "::error::Admin panel returned ${STATUS}"; exit 1; }
          echo "Admin panel OK"

  smoke-test-android:
    name: Smoke Test (Android Boot)
    needs: [validate-release, build-android, deploy-android-prod]
    if: |
      always() &&
      needs.deploy-android-prod.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v7
        with:
          name: android-prod-debug
          path: debug-apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator and verify app launches
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "=== Installing APK ==="
            adb install debug-apk/*.apk
            echo "=== Launching app ==="
            adb shell am start -W -n com.shyden.shytalk/com.shyden.shytalk.MainActivity 2>&1 || true
            sleep 5
            echo "=== Checking for fatal crashes in logcat ==="
            adb logcat -d -s AndroidRuntime > /tmp/runtime.log 2>&1
            CRASHES=$(grep -c "FATAL EXCEPTION" /tmp/runtime.log || true)
            if [ "$CRASHES" -gt 0 ] 2>/dev/null; then echo "::error::Found $CRASHES fatal crash(es)"; cat /tmp/runtime.log | tail -30; exit 1; fi
            echo "No fatal crashes — Android APK installs and launches successfully"

  smoke-test-ios:
    name: Smoke Test (iOS Boot)
    needs: [validate-release, deploy-ios-prod]
    if: |
      always() &&
      needs.deploy-ios-prod.result == 'success'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          GOOGLE_SERVICES_PROD_BASE64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_PROD_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Build KMP shared framework for iOS Simulator
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app for simulator
        run: |
          cd iosApp
          xcodebuild build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator and verify app launches
        run: |
          echo "=== Booting simulator ==="
          DEVICE_ID=$(xcrun simctl create "smoke-test" "iPhone 16")
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

          echo "=== Installing app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "iosApp.app" -path "*/Debug-iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find iosApp/build -name "iosApp.app" -path "*Debug-iphonesimulator*" | head -1)
          fi
          echo "App path: $APP_PATH"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

          echo "=== Launching app ==="
          xcrun simctl launch "$DEVICE_ID" com.shyden.shytalk
          sleep 10

          echo "=== Checking for crashes ==="
          CRASH_COUNT=$(find ~/Library/Logs/DiagnosticReports -name "iosApp*" -newer /tmp/smoke-start 2>/dev/null | wc -l || echo 0)
          if [ "$CRASH_COUNT" -gt 0 ]; then
            echo "::error::Found crash report(s)"
            cat ~/Library/Logs/DiagnosticReports/iosApp* 2>/dev/null | head -30
            xcrun simctl shutdown "$DEVICE_ID" || true
            exit 1
          fi

          echo "No crashes detected — iOS app boots successfully"
          xcrun simctl shutdown "$DEVICE_ID" || true

  # ── Alert on failure ───────────────────────────────────────
  alert-desync:
    name: Alert - Deploy Failed
    needs: [validate-release, deploy-backend-prod, deploy-web-prod, deploy-android-prod, deploy-ios-prod, smoke-test-backend-web, smoke-test-android, smoke-test-ios]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      (needs.deploy-backend-prod.result == 'failure' ||
       needs.deploy-web-prod.result == 'failure' ||
       needs.deploy-android-prod.result == 'failure' ||
       needs.deploy-ios-prod.result == 'failure' ||
       needs.smoke-test-backend-web.result == 'failure' ||
       needs.smoke-test-android.result == 'failure' ||
       needs.smoke-test-ios.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create critical issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release-tag }}
          BACKEND: ${{ needs.deploy-backend-prod.result }}
          WEB: ${{ needs.deploy-web-prod.result }}
          ANDROID: ${{ needs.deploy-android-prod.result }}
          IOS: ${{ needs.deploy-ios-prod.result }}
          SMOKE_API: ${{ needs.smoke-test-backend-web.result }}
          SMOKE_ANDROID: ${{ needs.smoke-test-android.result }}
          SMOKE_IOS: ${{ needs.smoke-test-ios.result }}
        run: |
          FAILED=""
          [ "$BACKEND" = "failure" ] && FAILED="${FAILED}- Backend API deploy\n"
          [ "$WEB" = "failure" ] && FAILED="${FAILED}- Web deploy\n"
          [ "$ANDROID" = "failure" ] && FAILED="${FAILED}- Android (Play Store)\n"
          [ "$IOS" = "failure" ] && FAILED="${FAILED}- iOS (App Store)\n"
          [ "$SMOKE_API" = "failure" ] && FAILED="${FAILED}- Smoke test: API + Web\n"
          [ "$SMOKE_ANDROID" = "failure" ] && FAILED="${FAILED}- Smoke test: Android boot\n"
          [ "$SMOKE_IOS" = "failure" ] && FAILED="${FAILED}- Smoke test: iOS boot\n"

          BODY_FILE=$(mktemp)
          {
            echo "## Production Deploy Failed"
            echo ""
            echo "**Release:** ${TAG}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Failed components"
            echo -e "$FAILED"
            echo ""
            echo "### Immediate action required"
            echo "1. Check the deploy job logs for the failure reason"
            echo "2. Fix the issue and re-run deploy-prod with the same tag"
            echo "3. Verify production matches the expected release"
            echo "4. Close this issue once resolved"
          } > "$BODY_FILE"
          gh issue create \
            --title "CRITICAL: Production deploy failed for ${TAG}" \
            --label "critical,prod-desync" \
            --body-file "$BODY_FILE"
