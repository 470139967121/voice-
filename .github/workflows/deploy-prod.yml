name: Deploy To Prod
# Deploy a specific release tag to production

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to deploy (e.g. v0.55.0)'
        type: string
        required: true
      backend:
        description: 'Deploy Express API to prod'
        type: boolean
        default: true
      web:
        description: 'Deploy web to prod'
        type: boolean
        default: true
      android:
        description: 'Build + upload to Play Store'
        type: boolean
        default: true
      ios:
        description: 'Build + upload to App Store'
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-release:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}
          fetch-depth: 0

      - name: Validate tag exists and is on main
        id: validate
        env:
          TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if ! git tag -l "$TAG" | grep -q "$TAG"; then
            echo "::error::Tag $TAG does not exist"
            exit 1
          fi
          # Hard fail (not warn) if the tag isn't on main. Prod hygiene: only
          # deploy code that's been merged to main. Don't suppress stderr
          # from git merge-base — a typo'd tag should produce a real error.
          if ! git merge-base --is-ancestor "$TAG" origin/main; then
            echo "::error::Tag $TAG is not an ancestor of origin/main. Refusing to deploy off-main code to prod."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying release $TAG (version $VERSION)"

  # ── Build Android (shared by deploy + smoke test) ──────────
  build-android:
    name: Build Android
    needs: [validate-release]
    if: inputs.android
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          prod-base64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}

      - uses: ./.github/actions/decode-keystore
        with:
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build prodRelease (AAB + APK) and prodDebug APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        run: ./gradlew assembleProdRelease bundleProdRelease assembleProdDebug --parallel

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-prod-release
          path: |
            app/build/outputs/bundle/prodRelease/*.aab
            app/build/outputs/apk/prod/release/*.apk
            app/src/main/play/release-notes/
          retention-days: 3

      - name: Upload debug APK for smoke test
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-prod-debug
          path: app/build/outputs/apk/prod/debug/*.apk
          retention-days: 3

  # ── Deploy jobs ────────────────────────────────────────────
  deploy-backend-prod:
    name: Deploy Backend to Prod
    needs: [validate-release]
    if: inputs.backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - uses: ./.github/actions/setup-node

      - name: Install deploy tools
        run: npm install -g firebase-tools

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SINGAPORE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 213.35.98.160 >> ~/.ssh/known_hosts

      - name: Archive previous API version
        run: ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar czf /tmp/api-previous.tar.gz --exclude='node_modules' --exclude='.env' ."

      - name: Deploy Express API to Singapore (prod)
        run: |
          cd express-api
          tar czf /tmp/api.tar.gz --exclude='node_modules' --exclude='.env' .
          scp /tmp/api.tar.gz ubuntu@213.35.98.160:/tmp/
          ssh ubuntu@213.35.98.160 "cd ~/shytalk-api && tar xzf /tmp/api.tar.gz && npm install --omit=dev && pm2 restart shytalk-api"

      - name: Verify prod API health
        run: |
          for i in 1 2 3 4 5; do
            sleep 5
            if curl -sf https://api.shytalk.shyden.co.uk/api/health; then exit 0; fi
            echo "Health check attempt $i failed, retrying..."
          done
          echo "Prod API health check failed after 5 attempts"
          exit 1

      - uses: ./.github/actions/deploy-firebase-rules
        with:
          service-account-json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
          firebase-project: shytalk-7ba69

  deploy-web-prod:
    name: Deploy Web to Prod
    needs: [validate-release]
    if: inputs.web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - uses: ./.github/actions/setup-node

      - name: Install deploy tools
        run: npm install -g wrangler

      - name: Deploy web to prod site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '9315582c39b627dca58dfa83602db385'
          PROD_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
        run: |
          sed "s|<PROD_FIREBASE_API_KEY>|$PROD_FIREBASE_API_KEY|" public/admin/config.example.js > public/admin/config.js
          sed "s|<PROD_FIREBASE_API_KEY>|$PROD_FIREBASE_API_KEY|" public/portal/config.example.js > public/portal/config.js
          sed "s|<PROD_FIREBASE_API_KEY>|$PROD_FIREBASE_API_KEY|" public/js/roadmap-config.example.js > public/js/roadmap-config.js
          wrangler pages deploy public --project-name shytalk-site --branch main

  deploy-android-prod:
    name: Deploy Android to Play Store
    needs: [validate-release, build-android]
    if: inputs.android
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: android-prod-release
          path: android-release

      - name: Verify AAB present
        run: |
          set -euo pipefail
          shopt -s nullglob
          aabs=(android-release/build/outputs/bundle/prodRelease/*.aab)
          shopt -u nullglob
          if [ "${#aabs[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one .aab in android-release/build/outputs/bundle/prodRelease/, got ${#aabs[@]}"
            find android-release -type f
            exit 1
          fi
          echo "AAB present: ${aabs[0]} ($(du -h "${aabs[0]}" | cut -f1))"

      - name: Upload to Play Store internal testing track
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shyden.shytalk
          releaseFiles: android-release/build/outputs/bundle/prodRelease/*.aab
          track: internal
          status: draft
          releaseName: ${{ needs.validate-release.outputs.version }}
          whatsNewDirectory: android-release/src/main/play/release-notes

  deploy-ios-prod:
    name: Deploy iOS to App Store
    needs: [validate-release]
    if: inputs.ios
    runs-on: [self-hosted, macOS, ARM64, shytalk-mac]
    # Bumped from 45 -> 90 on 2026-04-28: K/Native linkReleaseFrameworkIosArm64
    # plus xcodebuild archive plus App Store upload total ~50 min worst case
    # on slow days; 90 gives runner-pool-slowdown headroom.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      # Fast pre-flight: assert the export plist hasn't been flipped back to
      # `destination: upload` (which would upload silently and break TestFlight,
      # as happened 2026-03-12 → 2026-04-29). Fails in <1s before we burn 20 min
      # on archive + export.
      - name: Assert ExportOptions.plist requires local export
        run: |
          set -euo pipefail
          dest=$(/usr/libexec/PlistBuddy -c "Print :destination" iosApp/ExportOptions.plist)
          if [ "$dest" != "export" ]; then
            echo "::error::iosApp/ExportOptions.plist destination must be 'export' (got '$dest'). 'upload' uploads silently during exportArchive and writes no local IPA, breaking the next step."
            exit 1
          fi

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/setup-ios-signing
        with:
          certificate-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          certificate-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          provision-profile-base64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          app-store-connect-key: ${{ secrets.APP_STORE_CONNECT_KEY }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          prod-base64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}

      - name: Build KMP shared framework for iOS
        run: |
          set -euo pipefail
          ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Install CocoaPods
        run: |
          set -euo pipefail
          cd iosApp
          pod install

      - name: Build and archive iOS app
        run: |
          set -euo pipefail
          cd iosApp
          xcodebuild \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="ShyTalk App Store Distribution" \
            DEVELOPMENT_TEAM=F3XX4PM3MF \
            archive

      - name: Export IPA
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          cd iosApp
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/iosApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_ID \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID
          # Verify a single IPA was produced (catches `destination: upload` regressions
          # that uploaded silently and left no local artifact, breaking the next step)
          shopt -s nullglob
          ipas=("$RUNNER_TEMP/export"/*.ipa)
          shopt -u nullglob
          if [ "${#ipas[@]}" -eq 0 ]; then
            echo "::error::xcodebuild -exportArchive completed but no .ipa was written to $RUNNER_TEMP/export/. Check ExportOptions.plist (destination must be 'export', not 'upload')."
            ls -la "$RUNNER_TEMP/export/" 2>&1 || true
            exit 1
          fi
          if [ "${#ipas[@]}" -gt 1 ]; then
            echo "::error::Expected exactly one .ipa, found ${#ipas[@]}: ${ipas[*]}"
            exit 1
          fi
          echo "Exported IPA: ${ipas[0]} ($(du -h "${ipas[0]}" | cut -f1))"

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          ipas=("$RUNNER_TEMP/export"/*.ipa)
          shopt -u nullglob
          # Post-export step already verified exactly one IPA exists. Re-glob is
          # only needed to populate ipas[0] for altool's -f arg.
          # altool is famous for printing product-errors to stdout while exiting 0
          # (auth-key revoked, asset validation rejection, etc). Capture output
          # and grep it so we fail loudly when ASC reports an upload-time error.
          # `set -o pipefail` (already on from `set -euo pipefail`) makes a
          # non-zero altool exit propagate through the `tee` pipe, so we don't
          # need PIPESTATUS gymnastics — set -e aborts before the grep runs.
          upload_log="$RUNNER_TEMP/altool-upload.log"
          xcrun altool --upload-app \
            -f "${ipas[0]}" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format xml 2>&1 | tee "$upload_log"
          if grep -qE '<key>product-errors</key>|<key>tool-errors</key>' "$upload_log"; then
            echo "::error::altool reported errors despite exit 0 — see log above"
            exit 1
          fi
          echo "altool upload accepted by App Store Connect"

      - name: Clean up signing material
        if: always()
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        # Self-hosted runner: scrub all signing material to prevent .p8/.p12
        # leaking between jobs. Don't fail the job on cleanup — log warnings
        # instead so the deploy outcome reflects deploy success/failure only.
        # Mirrors what setup-ios-signing/action.yml writes — keep these in sync.
        run: |
          set -uo pipefail
          fail=0
          # Extract the profile UUID before deleting the source profile, since
          # we need it to remove the mirrored copy in ~/Library/MobileDevice/.
          PROFILE_UUID=""
          if [ -f "$RUNNER_TEMP/profile.mobileprovision" ]; then
            PROFILE_UUID=$(/usr/bin/security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" 2>/dev/null \
              | grep -A1 '<key>UUID</key>' | grep '<string>' \
              | sed 's/.*<string>\(.*\)<\/string>.*/\1/' || true)
          fi
          # Temp keychain
          if [ -f "$RUNNER_TEMP/app-signing.keychain-db" ]; then
            if ! security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db"; then
              echo "::warning::Failed to delete keychain at $RUNNER_TEMP/app-signing.keychain-db"
              fail=1
            fi
          fi
          # Restore the user keychain search list so we don't accumulate
          # references to deleted keychains across runs on the persistent runner.
          if ! security list-keychain -d user -s "$HOME/Library/Keychains/login.keychain-db"; then
            echo "::warning::Failed to restore login keychain search list"
            fail=1
          fi
          # All signing material in $RUNNER_TEMP (cert .p12, profile, IPA, archive, log)
          rm -rf "$RUNNER_TEMP/export" \
                 "$RUNNER_TEMP/iosApp.xcarchive" \
                 "$RUNNER_TEMP/altool-upload.log" || true
          rm -f "$RUNNER_TEMP/certificate.p12" \
                "$RUNNER_TEMP/profile.mobileprovision" || true
          # App Store Connect API key (.p8) lives outside $RUNNER_TEMP
          if [ -n "${APP_STORE_CONNECT_KEY_ID:-}" ]; then
            rm -f "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8" || true
          fi
          # Mirrored profile in ~/Library/MobileDevice/Provisioning Profiles/
          if [ -n "$PROFILE_UUID" ]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision" || true
          fi
          if [ "$fail" -eq 0 ]; then
            echo "Signing material scrubbed."
          fi
          exit 0

  # ── Smoke tests (after deploys) ────────────────────────────
  smoke-test-backend-web:
    name: Smoke Test (API + Web)
    needs: [validate-release, deploy-backend-prod, deploy-web-prod, deploy-android-prod, deploy-ios-prod]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      (needs.deploy-backend-prod.result == 'success' ||
       needs.deploy-web-prod.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify API health
        if: needs.deploy-backend-prod.result == 'success'
        run: |
          echo "=== API Health Check ==="
          HEALTH=$(curl -sf https://api.shytalk.shyden.co.uk/api/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"ok"' || { echo "::error::Health check failed"; exit 1; }

      - name: Verify API endpoints respond
        if: needs.deploy-backend-prod.result == 'success'
        run: |
          set -euo pipefail
          echo "=== API Endpoint Checks ==="
          ERRORS=0
          # Whitelist expected status per endpoint. Anything else fails the
          # smoke test — including 404 (route removed), 400 (validation
          # broke), 403 (auth misconfigured), 429 (rate-limit gone wild).
          # The previous "anything not 5xx is OK" pattern silently passed
          # all of those.
          check() {
            local endpoint=$1 expected=$2
            local status
            # `--max-time 10` caps DNS+connect+TLS+response. `|| echo "000"`
            # converts curl's exit-on-network-failure (DNS, refused, timeout)
            # into a sentinel status so the check fails-loud at the same
            # whitelist comparison as a wrong HTTP code, rather than `set -e`
            # aborting the whole verification before the FAIL line prints.
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://api.shytalk.shyden.co.uk${endpoint}" || echo "000")
            if echo "$status" | grep -qE "^(${expected})$"; then
              echo "OK: ${endpoint} → ${status} (expected ${expected})"
            else
              echo "FAIL: ${endpoint} → ${status} (expected ${expected})"
              ERRORS=$((ERRORS + 1))
            fi
          }
          check "/api/health"            "200"
          check "/api/users/me"          "401"
          check "/api/rooms"             "401"
          check "/api/conversations"     "401"
          check "/api/admin/alerts"      "401"
          check "/api/admin/banners"     "401"
          [ "$ERRORS" -eq 0 ] || { echo "::error::${ERRORS} endpoint(s) returned unexpected status"; exit 1; }
          echo "All API endpoints responding correctly"

      - name: Verify web landing page
        if: needs.deploy-web-prod.result == 'success'
        run: |
          echo "=== Web Landing Page ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://shytalk.shyden.co.uk")
          [ "$STATUS" = "200" ] || { echo "::error::Landing page returned ${STATUS}"; exit 1; }
          BODY=$(curl -sf "https://shytalk.shyden.co.uk")
          echo "$BODY" | grep -qi "shytalk" || { echo "::error::Missing ShyTalk content"; exit 1; }
          echo "Landing page OK"

      - name: Verify admin panel
        if: needs.deploy-web-prod.result == 'success'
        run: |
          echo "=== Admin Panel ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://shytalk.shyden.co.uk/admin/")
          [ "$STATUS" = "200" ] || { echo "::error::Admin panel returned ${STATUS}"; exit 1; }
          echo "Admin panel OK"

  smoke-test-android:
    name: Smoke Test (Android Boot)
    needs: [validate-release, build-android, deploy-android-prod]
    if: |
      always() &&
      needs.deploy-android-prod.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: android-prod-debug
          path: debug-apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator and verify app launches
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -euo pipefail
            echo "=== Installing APK ==="
            shopt -s nullglob
            apks=(debug-apk/*.apk)
            shopt -u nullglob
            if [ "${#apks[@]}" -ne 1 ]; then
              echo "::error::Expected exactly one debug APK, found ${#apks[@]}"
              exit 1
            fi
            adb install -r "${apks[0]}"
            echo "=== Launching app ==="
            am_output=$(adb shell am start -W -n com.shyden.shytalk/com.shyden.shytalk.MainActivity 2>&1)
            echo "$am_output"
            # Match only real failures. The benign messages
            # "Activity not started, its current task has been brought to the front"
            # and "Activity not started, intent has been delivered to currently running top-most instance"
            # are normal `am start` output when re-launching. Match the
            # "unable to" variant or explicit Error type/Java exception lines.
            if echo "$am_output" | grep -qE '^Error|FATAL|Activity not started, unable to|java\.lang\.|Exception type'; then
              echo "::error::am start reported an error — app failed to launch"
              exit 1
            fi
            sleep 3
            echo "=== Verifying app is foreground activity ==="
            focused=$(adb shell dumpsys window windows 2>&1 | grep -E 'mCurrentFocus' || true)
            echo "$focused"
            if ! echo "$focused" | grep -q 'com.shyden.shytalk'; then
              echo "::error::ShyTalk is not the foreground activity. Got: $focused"
              exit 1
            fi
            sleep 5
            echo "=== Checking for fatal crashes in logcat ==="
            adb logcat -d -s AndroidRuntime > /tmp/runtime.log 2>&1
            CRASHES=$(grep -c "FATAL EXCEPTION" /tmp/runtime.log || echo 0)
            if [ "${CRASHES:-0}" -gt 0 ]; then
              echo "::error::Found $CRASHES fatal crash(es)"
              tail -30 /tmp/runtime.log
              exit 1
            fi
            echo "No fatal crashes — Android APK installs and launches successfully"

  smoke-test-ios:
    name: Smoke Test (iOS Boot)
    needs: [validate-release, deploy-ios-prod]
    if: |
      always() &&
      needs.deploy-ios-prod.result == 'success'
    runs-on: [self-hosted, macOS, ARM64, shytalk-mac]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.release-tag }}

      - uses: ./.github/actions/setup-jdk-gradle

      - uses: ./.github/actions/decode-google-services
        with:
          dev-base64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
          prod-base64: ${{ secrets.GOOGLE_SERVICES_PROD_BASE64 }}

      - name: Build KMP shared framework for iOS Simulator
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Install CocoaPods
        run: cd iosApp && pod install

      - name: Build iOS app for simulator
        run: |
          cd iosApp
          xcodebuild build \
            -workspace iosApp.xcworkspace \
            -scheme iosApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator and verify app launches
        run: |
          set -euo pipefail
          echo "=== Booting simulator ==="
          DEVICE_ID=$(xcrun simctl create "smoke-test" "iPhone 16")
          # On the self-hosted Mac, leaked simulators accumulate across jobs.
          # Trap shutdown+delete on EVERY exit (success, failure, signal) so
          # we don't depend on the explicit cleanup at the end of the script.
          trap 'xcrun simctl shutdown "$DEVICE_ID" 2>/dev/null || true; xcrun simctl delete "$DEVICE_ID" 2>/dev/null || true' EXIT
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

          echo "=== Locating built app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "iosApp.app" -path "*/Debug-iphonesimulator/*" -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find iosApp/build -name "iosApp.app" -path "*Debug-iphonesimulator*" -print -quit)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "::error::Could not locate iosApp.app build product. Check derivedDataPath of the build step."
            echo "Searched ~/Library/Developer/Xcode/DerivedData and iosApp/build"
            xcrun simctl shutdown "$DEVICE_ID" || true
            exit 1
          fi
          echo "App path: $APP_PATH"

          echo "=== Installing app ==="
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          if ! xcrun simctl get_app_container "$DEVICE_ID" com.shyden.shytalk app >/dev/null 2>&1; then
            echo "::error::App did not install — get_app_container returned non-zero"
            xcrun simctl shutdown "$DEVICE_ID" || true
            exit 1
          fi

          echo "=== Launching app ==="
          touch /tmp/smoke-start
          # simctl launch returns the launched PID on success and non-zero on
          # failure (e.g., "no eligible application", "code-signing rejected").
          # Without set -e this used to silently progress to the crash-check
          # which then "passed" because nothing was running to crash.
          xcrun simctl launch "$DEVICE_ID" com.shyden.shytalk
          sleep 10

          echo "=== Checking for crashes ==="
          CRASH_COUNT=$(find ~/Library/Logs/DiagnosticReports -name "iosApp*" -newer /tmp/smoke-start 2>/dev/null | wc -l | tr -d ' ')
          if [ "${CRASH_COUNT:-0}" -gt 0 ]; then
            echo "::error::Found crash report(s)"
            cat ~/Library/Logs/DiagnosticReports/iosApp* 2>/dev/null | head -30
            xcrun simctl shutdown "$DEVICE_ID" || true
            exit 1
          fi

          echo "No crashes detected — iOS app boots successfully"
          xcrun simctl shutdown "$DEVICE_ID" || true

  # ── Alert on failure ───────────────────────────────────────
  alert-desync:
    name: Alert - Deploy Failed
    needs: [validate-release, deploy-backend-prod, deploy-web-prod, deploy-android-prod, deploy-ios-prod, smoke-test-backend-web, smoke-test-android, smoke-test-ios]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      (needs.deploy-backend-prod.result == 'failure' ||
       needs.deploy-web-prod.result == 'failure' ||
       needs.deploy-android-prod.result == 'failure' ||
       needs.deploy-ios-prod.result == 'failure' ||
       needs.smoke-test-backend-web.result == 'failure' ||
       needs.smoke-test-android.result == 'failure' ||
       needs.smoke-test-ios.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create critical issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release-tag }}
          BACKEND: ${{ needs.deploy-backend-prod.result }}
          WEB: ${{ needs.deploy-web-prod.result }}
          ANDROID: ${{ needs.deploy-android-prod.result }}
          IOS: ${{ needs.deploy-ios-prod.result }}
          SMOKE_API: ${{ needs.smoke-test-backend-web.result }}
          SMOKE_ANDROID: ${{ needs.smoke-test-android.result }}
          SMOKE_IOS: ${{ needs.smoke-test-ios.result }}
        run: |
          FAILED=""
          [ "$BACKEND" = "failure" ] && FAILED="${FAILED}- Backend API deploy\n"
          [ "$WEB" = "failure" ] && FAILED="${FAILED}- Web deploy\n"
          [ "$ANDROID" = "failure" ] && FAILED="${FAILED}- Android (Play Store)\n"
          [ "$IOS" = "failure" ] && FAILED="${FAILED}- iOS (App Store)\n"
          [ "$SMOKE_API" = "failure" ] && FAILED="${FAILED}- Smoke test: API + Web\n"
          [ "$SMOKE_ANDROID" = "failure" ] && FAILED="${FAILED}- Smoke test: Android boot\n"
          [ "$SMOKE_IOS" = "failure" ] && FAILED="${FAILED}- Smoke test: iOS boot\n"

          BODY_FILE=$(mktemp)
          {
            echo "## Production Deploy Failed"
            echo ""
            echo "**Release:** ${TAG}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "### Failed components"
            echo -e "$FAILED"
            echo ""
            echo "### Immediate action required"
            echo "1. Check the deploy job logs for the failure reason"
            echo "2. Fix the issue and re-run deploy-prod with the same tag"
            echo "3. Verify production matches the expected release"
            echo "4. Close this issue once resolved"
          } > "$BODY_FILE"
          gh issue create \
            --title "CRITICAL: Production deploy failed for ${TAG}" \
            --label "critical,prod-desync" \
            --body-file "$BODY_FILE"
