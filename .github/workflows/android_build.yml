name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create dummy Google Services JSON
        run: |
          echo '{"project_info":{"project_number":"881846974606","project_id":"shytalk-dev","storage_bucket":"shytalk-dev.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:881846974606:android:6f68a881846974606","android_client_info":{"package_name":"com.shyden.shytalk.local"}},"oauth_client":[],"api_key":[{"current_key":"fake-api-key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Create dummy Play Service Account JSON
        run: |
          echo '{"type":"service_account","project_id":"shytalk-dev","private_key_id":"fake-key-id","private_key":"-----BEGIN PRIVATE KEY-----\nFAKE\n-----END PRIVATE KEY-----\n","client_email":"fake@shytalk-dev.iam.gserviceaccount.com","client_id":"fake-id","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token","auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs","client_x509_cert_url":"https://www.googleapis.com/robot/v1/metadata/x509/fake"}' > play-service-account.json

      - name: Build with Gradle
        env:
          LIVEKIT_URL: wss://mymediaserver77-9odvi2kr.livekit.cloud
        run: ./gradlew assembleLocalDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ShyTalk-Local-Debug-APK
          path: app/build/outputs/apk/local/debug/*.apk
