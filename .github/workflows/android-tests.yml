name: Android Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create dummy google-services.json
        run: |
          mkdir -p app
          echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:dummy","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"dummy"}]}],"configuration_version":"1"}' > app/google-services.json

      - name: Run unit tests
        run: ./gradlew test
