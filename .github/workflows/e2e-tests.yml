name: E2E Tests

on:
  workflow_call:
    inputs:
      android:
        description: 'Android (all, none, or e.g. 28-phone,35-tablet)'
        type: string
        default: 'all'
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      web:
        description: 'Web (all, none, or e.g. chromium,firefox,mobile-chrome)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true
      ref:
        description: 'Git ref to test'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      android:
        description: 'Android (all, none, or e.g. 28-phone,35-tablet)'
        type: string
        default: 'all'
      ios:
        description: 'iOS (all, none, or e.g. 16.4-iphone,18.1-ipad)'
        type: string
        default: 'all'
      web:
        description: 'Web (all, none, or e.g. chromium,firefox,mobile-chrome)'
        type: string
        default: 'all'
      parallel:
        description: 'Run matrix jobs in parallel'
        type: boolean
        default: true

# Only one E2E run at a time — prevents resource contention and Firestore conflicts
concurrency:
  group: e2e-tests
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve inputs into device matrices ──────────────────────
  resolve-inputs:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_android: ${{ steps.resolve.outputs.run_android }}
      run_ios: ${{ steps.resolve.outputs.run_ios }}
      run_web: ${{ steps.resolve.outputs.run_web }}
      android_matrix: ${{ steps.resolve.outputs.android_matrix }}
      ios_matrix: ${{ steps.resolve.outputs.ios_matrix }}
      web_matrix: ${{ steps.resolve.outputs.web_matrix }}
      parallel: ${{ steps.resolve.outputs.parallel }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve platforms, devices, and ref
        id: resolve
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const ANDROID_ALL = [
              { 'api-level': 28, 'form-factor': 'phone', profile: 'pixel_2' },
              { 'api-level': 28, 'form-factor': 'tablet', profile: 'Nexus 10' },
              { 'api-level': 30, 'form-factor': 'phone', profile: 'pixel_4' },
              { 'api-level': 30, 'form-factor': 'tablet', profile: 'Nexus 10' },
              { 'api-level': 33, 'form-factor': 'phone', profile: 'pixel_6' },
              { 'api-level': 33, 'form-factor': 'tablet', profile: 'pixel_tablet' },
              { 'api-level': 35, 'form-factor': 'phone', profile: 'pixel_9' },
              { 'api-level': 35, 'form-factor': 'tablet', profile: 'pixel_tablet' },
            ];
            const IOS_ALL = [
              { 'ios-version': '16.4', 'form-factor': 'iphone', simulator: 'iPhone 14' },
              { 'ios-version': '16.4', 'form-factor': 'ipad', simulator: 'iPad (10th generation)' },
              { 'ios-version': '17.5', 'form-factor': 'iphone', simulator: 'iPhone 15' },
              { 'ios-version': '17.5', 'form-factor': 'ipad', simulator: 'iPad Air (M2)' },
              { 'ios-version': '18.1', 'form-factor': 'iphone', simulator: 'iPhone 16' },
              { 'ios-version': '18.1', 'form-factor': 'ipad', simulator: 'iPad Air (M3)' },
            ];
            const WEB_ALL = [
              { project: 'chromium', browser: 'Chromium', viewport: '1280x720' },
              { project: 'firefox', browser: 'Firefox', viewport: '1280x720' },
              { project: 'webkit', browser: 'WebKit', viewport: '1280x720' },
              { project: 'mobile-chrome', browser: 'Mobile Chrome (Pixel 5)', viewport: '393x851' },
              { project: 'mobile-safari', browser: 'Mobile Safari (iPhone 13)', viewport: '390x844' },
            ];

            const android = '${{ inputs.android }}' || 'all';
            const ios = '${{ inputs.ios }}' || 'all';
            const web = '${{ inputs.web }}' || 'all';
            const parallel = '${{ inputs.parallel }}' !== 'false';
            const ref = '${{ inputs.ref }}' || context.sha;

            function filter(input, catalog, keyFn) {
              if (input === 'none' || input === 'false') return [];
              if (input === 'all' || input === 'true') return catalog;
              const selected = input.split(',').map(s => s.trim().toLowerCase());
              return catalog.filter(item => selected.includes(keyFn(item)));
            }

            const androidMatrix = filter(android, ANDROID_ALL, d => `${d['api-level']}-${d['form-factor']}`);
            const iosMatrix = filter(ios, IOS_ALL, d => `${d['ios-version']}-${d['form-factor']}`);
            const webMatrix = filter(web, WEB_ALL, d => d.project);

            core.setOutput('ref', ref);
            core.setOutput('parallel', String(parallel));
            core.setOutput('run_android', String(androidMatrix.length > 0));
            core.setOutput('run_ios', String(iosMatrix.length > 0));
            core.setOutput('run_web', String(webMatrix.length > 0));
            core.setOutput('android_matrix', JSON.stringify({ include: androidMatrix }));
            core.setOutput('ios_matrix', JSON.stringify({ include: iosMatrix }));
            core.setOutput('web_matrix', JSON.stringify({ include: webMatrix }));

            console.log(`Android: ${androidMatrix.length} devices, iOS: ${iosMatrix.length} devices, Web: ${webMatrix.length} browsers`);

  # ── Android E2E ─────────────────────────────────────────────
  test-android:
    name: "Android E2E (API ${{ matrix.api-level }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.android_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDevDebugAndroidTest --no-parallel 2>&1 | tee test-output.log

      - name: Collect Allure results from JUnit XML
        if: always()
        run: |
          mkdir -p allure-results-android
          PACKAGE="com.shyden.shytalk.dev"
          adb exec-out run-as $PACKAGE sh -c 'cd files/allure-results && tar cf - .' 2>/dev/null | \
            tar xf - -C allure-results-android/ 2>/dev/null || true
          NATIVE_COUNT=$(find allure-results-android -name "*-result.json" 2>/dev/null | wc -l)
          echo "Native Allure results: $NATIVE_COUNT files"
          if [ "$NATIVE_COUNT" -eq 0 ]; then
            echo "No native Allure results — using JUnit XML for Allure import"
            find app/build/outputs/androidTest-results -name "TEST-*.xml" 2>/dev/null \
              -exec cp {} allure-results-android/ \; || true
          fi

      - name: Write Android environment.properties
        if: always()
        run: |
          sed 's/^ *//' > allure-results-android/environment.properties <<'ENVEOF'
          platform=Android
          api_level=${{ matrix.api-level }}
          device=${{ matrix.profile }}
          environment=dev
          ENVEOF

      - name: Upload Allure results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: allure-results-android-api${{ matrix.api-level }}-${{ matrix.form-factor }}
          path: allure-results-android/
          retention-days: 14

      - name: Upload test output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: android-test-output-api${{ matrix.api-level }}-${{ matrix.form-factor }}
          path: |
            test-output.log
            app/build/reports/androidTests/connected/
          retention-days: 14

  # ── Prepare Playwright browsers ─────────────────────────────
  prepare-playwright:
    name: Prepare Playwright
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw
        run: echo "version=$(npx playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true'
        run: npx playwright install

    outputs:
      pw-version: ${{ steps.pw.outputs.version }}

  # ── Playwright Web Tests ────────────────────────────────────
  test-playwright:
    name: "Playwright (${{ matrix.project }})"
    needs: [resolve-inputs, prepare-playwright]
    if: always() && needs.prepare-playwright.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.web_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers from cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ needs.prepare-playwright.outputs.pw-version }}

      - name: Cache apt packages for Playwright
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-playwright-${{ needs.prepare-playwright.outputs.pw-version }}

      - name: Install system dependencies
        run: npx playwright install-deps

      - name: Run Playwright tests (${{ matrix.project }})
        env:
          WEB_BASE_URL: https://dev.shytalk.shyden.co.uk
          API_BASE_URL: https://dev-api.shytalk.shyden.co.uk
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          ALLURE_ENABLED: 'true'
          ALLURE_PROJECT: ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }} --reporter=list,allure-playwright,html

      - name: Write environment.properties
        if: always()
        run: |
          DIR="allure-results/${{ matrix.project }}"
          mkdir -p "$DIR"
          sed 's/^ *//' > "$DIR/environment.properties" <<'PWEOF'
          platform=Web
          browser=${{ matrix.browser }}
          viewport=${{ matrix.viewport }}
          base_url=dev.shytalk.shyden.co.uk
          PWEOF

      - name: Upload Allure results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: allure-results-playwright-${{ matrix.project }}
          path: allure-results/
          retention-days: 14

      - name: Upload failure screenshots and traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: playwright-failures-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  # ── Build iOS test bundle ───────────────────────────────────
  build-ios:
    name: Build iOS
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Check for iOS test targets
        id: check-tests
        run: |
          if grep -rq 'XCTestCase\|import XCTest' iosApp/ 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No iOS test targets found. Skipping iOS E2E tests."
          fi

      - name: Build shared KMP framework for iOS Simulator
        if: steps.check-tests.outputs.has_tests == 'true'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app for testing
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          xcodebuild build-for-testing \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test bundle
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/
          retention-days: 3

    outputs:
      has_tests: ${{ steps.check-tests.outputs.has_tests }}

  # ── iOS E2E test matrix ─────────────────────────────────────
  test-ios:
    name: "iOS E2E (iOS ${{ matrix.ios-version }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs, build-ios]
    if: always() && needs.build-ios.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true' && needs.build-ios.outputs.has_tests == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix: ${{ fromJSON(needs.resolve-inputs.outputs.ios_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Download iOS test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/

      - name: Install iOS ${{ matrix.ios-version }} simulator runtime
        run: |
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')"
          if xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Runtime $RUNTIME_ID already installed"
          else
            xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.ios-version }}" 2>/dev/null || \
            xcodebuild -downloadPlatform iOS || \
            echo "::warning::Could not install iOS ${{ matrix.ios-version }} runtime."
          fi
          xcrun simctl list runtimes

      - name: Boot simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl create "test-device" \
            "${{ matrix.simulator }}" \
            "com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Run iOS E2E tests
        run: |
          xcodebuild test-without-building \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/ios-results/result.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: ios-results-${{ matrix.ios-version }}-${{ matrix.form-factor }}
          path: build/ios-results/
          retention-days: 14

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ steps.sim.outputs.device_id }}" || true

  # ── Summary ─────────────────────────────────────────────────
  e2e-summary:
    name: E2E Summary
    needs: [resolve-inputs, test-android, test-ios, test-playwright]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          ANDROID="${{ needs.test-android.result }}"
          IOS="${{ needs.test-ios.result }}"
          PW="${{ needs.test-playwright.result }}"

          echo "- Android E2E: $ANDROID" >> "$GITHUB_STEP_SUMMARY"
          echo "- iOS E2E: $IOS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Playwright Web: $PW" >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for RESULT in "$ANDROID" "$IOS" "$PW"; do
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = true ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Some test suites failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ── Generate Unified Allure Report ──────────────────────────
  allure-report:
    name: Generate Allure Report
    needs: [resolve-inputs, test-android, test-ios, test-playwright]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all Allure results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: true

      - name: Merge environment.properties from all test suites
        run: |
          MERGED="allure-results-all/environment.properties"
          > "$MERGED"
          find allure-results-all -name environment.properties -not -path "$MERGED" | sort | while read -r f; do
            SUITE=$(echo "$f" | sed 's|allure-results-all/||;s|/environment.properties||;s|/|.|g')
            while IFS= read -r line; do
              trimmed=$(echo "$line" | sed 's/^[[:space:]]*//')
              [ -z "$trimmed" ] && continue
              KEY=$(echo "$trimmed" | cut -d= -f1)
              VALUE=$(echo "$trimmed" | cut -d= -f2-)
              echo "${SUITE}.${KEY}=${VALUE}" >> "$MERGED"
            done < "$f"
          done
          echo "Merged environment.properties:"
          cat "$MERGED"

      - name: Sanitize results (strip secrets for public report)
        run: bash .github/scripts/sanitize-allure.sh allure-results-all/

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar xz
          echo "$PWD/allure-2.32.0/bin" >> "$GITHUB_PATH"

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history for trend tracking
        run: |
          mkdir -p allure-results-all/history
          cp -r gh-pages/history/* allure-results-all/history/ 2>/dev/null || echo "No previous history (first run)"

      - name: Generate Allure report
        run: allure generate allure-results-all -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false

      - name: Post report URL in summary
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          echo "## Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[View Report](https://${OWNER}.github.io/${REPO##*/}/)" >> "$GITHUB_STEP_SUMMARY"
