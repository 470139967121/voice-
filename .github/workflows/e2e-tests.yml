name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to test'
        required: true
        type: choice
        options:
          - both
          - android
          - ios
        default: both
      parallel:
        description: 'Run matrix jobs in parallel'
        required: true
        type: boolean
        default: true

  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: e2e-tests-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ── Parse PR comment trigger ──────────────────────────────────
  parse-comment:
    name: Parse Comment
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      platform: ${{ steps.parse.outputs.platform }}
      ref: ${{ steps.parse.outputs.ref }}
    steps:
      - name: Parse /run-e2e comment
        id: parse
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const issue = context.payload.issue;

            if (!issue.pull_request) {
              core.setOutput('should_run', 'false');
              return;
            }

            const match = comment.match(/^\/run-e2e(?:\s+(android|ios|all|both))?$/i);
            if (!match) {
              core.setOutput('should_run', 'false');
              return;
            }

            const { data: permLevel } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(permLevel.permission)) {
              core.setOutput('should_run', 'false');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: issue.number,
            });

            let platform = (match[1] || 'both').toLowerCase();
            if (platform === 'all') platform = 'both';

            core.setOutput('should_run', 'true');
            core.setOutput('platform', platform);
            core.setOutput('ref', pr.head.sha);

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

  # ── Resolve inputs ────────────────────────────────────────────
  resolve-inputs:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [parse-comment]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (needs.parse-comment.result == 'success' && needs.parse-comment.outputs.should_run == 'true'))
    outputs:
      platform: ${{ steps.resolve.outputs.platform }}
      run_android: ${{ steps.resolve.outputs.run_android }}
      run_ios: ${{ steps.resolve.outputs.run_ios }}
      parallel: ${{ steps.resolve.outputs.parallel }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve platform and ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PLATFORM="${{ github.event.inputs.platform }}"
            PARALLEL="${{ github.event.inputs.parallel }}"
            REF="${{ github.sha }}"
          else
            PLATFORM="${{ needs.parse-comment.outputs.platform }}"
            PARALLEL="true"
            REF="${{ needs.parse-comment.outputs.ref }}"
          fi

          RUN_ANDROID=false
          RUN_IOS=false
          case "$PLATFORM" in
            android) RUN_ANDROID=true ;;
            ios)     RUN_IOS=true ;;
            both)    RUN_ANDROID=true; RUN_IOS=true ;;
          esac

          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "parallel=$PARALLEL" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "run_android=$RUN_ANDROID" >> "$GITHUB_OUTPUT"
          echo "run_ios=$RUN_IOS" >> "$GITHUB_OUTPUT"

          echo "Resolved: platform=$PLATFORM run_android=$RUN_ANDROID run_ios=$RUN_IOS parallel=$PARALLEL"

  # ── Android E2E (build + test in one job via Gradle) ─────────
  test-android:
    name: "Android E2E (API ${{ matrix.api-level }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix:
        include:
          - api-level: 34
            form-factor: phone
            profile: pixel_6
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@0a638108440efd5c7f980e6ba145dbcdd8f32009 # v2.37.0
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDevDebugAndroidTest --no-parallel 2>&1 | tee test-output.log

      - name: Collect Allure results from JUnit XML
        if: always()
        run: |
          mkdir -p allure-results-android

          # Try pulling native Allure results from device first
          PACKAGE="com.shyden.shytalk.dev"
          adb exec-out run-as $PACKAGE sh -c 'cd files/allure-results && tar cf - .' 2>/dev/null | \
            tar xf - -C allure-results-android/ 2>/dev/null || true
          NATIVE_COUNT=$(find allure-results-android -name "*-result.json" 2>/dev/null | wc -l)
          echo "Native Allure results: $NATIVE_COUNT files"

          # If no native results, copy JUnit XML (Allure can read these directly)
          if [ "$NATIVE_COUNT" -eq 0 ]; then
            echo "No native Allure results — using JUnit XML for Allure import"
            find app/build/outputs/androidTest-results -name "TEST-*.xml" 2>/dev/null \
              -exec cp {} allure-results-android/ \; || true
            XML_COUNT=$(find allure-results-android -name "TEST-*.xml" 2>/dev/null | wc -l)
            echo "JUnit XML files copied: $XML_COUNT"
          fi

      - name: Write Android environment.properties
        if: always()
        run: |
          cat > allure-results-android/environment.properties <<'ENVEOF'
          platform=Android
          api_level=${{ matrix.api-level }}
          device=${{ matrix.profile }}
          environment=dev
          ENVEOF

      - name: Upload Allure results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: allure-results-android-api${{ matrix.api-level }}-${{ matrix.form-factor }}
          path: allure-results-android/
          retention-days: 14

      - name: Upload test output
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: android-test-output-api${{ matrix.api-level }}-${{ matrix.form-factor }}
          path: |
            test-output.log
            app/build/reports/androidTests/connected/
          retention-days: 14

  # ── Playwright Web Tests (multi-browser matrix) ───────────────
  test-playwright:
    name: "Playwright (${{ matrix.project }})"
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: Chromium
            viewport: 1280x720
          - project: firefox
            browser: Firefox
            viewport: 1280x720
          - project: webkit
            browser: WebKit
            viewport: 1280x720
          - project: mobile-chrome
            browser: "Mobile Chrome (Pixel 5)"
            viewport: 393x851
          - project: mobile-safari
            browser: "Mobile Safari (iPhone 13)"
            viewport: 390x844
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests (${{ matrix.project }})
        env:
          WEB_BASE_URL: https://dev.shytalk.shyden.co.uk
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ALLURE_ENABLED: 'true'
          ALLURE_PROJECT: ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }} --reporter=list,allure-playwright,html

      - name: Write environment.properties
        if: always()
        run: |
          DIR="allure-results/${{ matrix.project }}"
          mkdir -p "$DIR"
          cat > "$DIR/environment.properties" <<EOF
          platform=Web
          browser=${{ matrix.browser }}
          viewport=${{ matrix.viewport }}
          base_url=dev.shytalk.shyden.co.uk
          EOF

      - name: Upload Allure results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: allure-results-playwright-${{ matrix.project }}
          path: allure-results/
          retention-days: 14

      - name: Upload failure screenshots and traces
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: playwright-failures-${{ matrix.project }}
          path: test-results/
          retention-days: 7

  # ── Build iOS test bundle ─────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: [resolve-inputs]
    if: always() && needs.resolve-inputs.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-read-only: false

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Check for iOS test targets
        id: check-tests
        run: |
          if grep -rq 'XCTestCase\|import XCTest' iosApp/ 2>/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No iOS test targets found. Skipping iOS E2E tests."
          fi

      - name: Build shared KMP framework for iOS Simulator
        if: steps.check-tests.outputs.has_tests == 'true'
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app for testing
        if: steps.check-tests.outputs.has_tests == 'true'
        run: |
          xcodebuild build-for-testing \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived-data \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test bundle
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/
          retention-days: 3

    outputs:
      has_tests: ${{ steps.check-tests.outputs.has_tests }}

  # ── iOS E2E test matrix ───────────────────────────────────────
  test-ios:
    name: "iOS E2E (iOS ${{ matrix.ios-version }}, ${{ matrix.form-factor }})"
    needs: [resolve-inputs, build-ios]
    if: always() && needs.build-ios.result == 'success' && needs.resolve-inputs.outputs.run_ios == 'true' && needs.build-ios.outputs.has_tests == 'true'
    runs-on: macos-14
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ needs.resolve-inputs.outputs.parallel == 'true' && 99 || 1 }}
      matrix:
        ios-version: ['16.4', '17.5', '18.1']
        form-factor: [iphone, ipad]
        include:
          - ios-version: '16.4'
            form-factor: iphone
            simulator: 'iPhone 14'
          - ios-version: '17.5'
            form-factor: iphone
            simulator: 'iPhone 15'
          - ios-version: '18.1'
            form-factor: iphone
            simulator: 'iPhone 16'
          - ios-version: '16.4'
            form-factor: ipad
            simulator: 'iPad (10th generation)'
          - ios-version: '17.5'
            form-factor: ipad
            simulator: 'iPad Air (M2)'
          - ios-version: '18.1'
            form-factor: ipad
            simulator: 'iPad Air (M3)'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.resolve-inputs.outputs.ref }}

      - name: Download iOS test bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ios-test-bundle
          path: build/ios-derived-data/

      - name: Install iOS ${{ matrix.ios-version }} simulator runtime
        run: |
          RUNTIME_ID="com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')"
          if xcrun simctl list runtimes | grep -q "$RUNTIME_ID"; then
            echo "Runtime $RUNTIME_ID already installed"
          else
            xcodebuild -downloadPlatform iOS -buildVersion "${{ matrix.ios-version }}" 2>/dev/null || \
            xcodebuild -downloadPlatform iOS || \
            echo "::warning::Could not install iOS ${{ matrix.ios-version }} runtime."
          fi
          xcrun simctl list runtimes

      - name: Boot simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl create "test-device" \
            "${{ matrix.simulator }}" \
            "com.apple.CoreSimulator.SimRuntime.iOS-$(echo '${{ matrix.ios-version }}' | tr '.' '-')")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID"

      - name: Run iOS E2E tests
        run: |
          xcodebuild test-without-building \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "id=${{ steps.sim.outputs.device_id }}" \
            -derivedDataPath build/ios-derived-data \
            -resultBundlePath build/ios-results/result.xcresult \
            CODE_SIGNING_ALLOWED=NO || true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: ios-results-${{ matrix.ios-version }}-${{ matrix.form-factor }}
          path: build/ios-results/
          retention-days: 14

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "${{ steps.sim.outputs.device_id }}" || true

  # ── Summary ───────────────────────────────────────────────────
  e2e-summary:
    name: E2E Summary
    needs: [resolve-inputs, test-android, test-ios, test-playwright]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          ANDROID="${{ needs.test-android.result }}"
          IOS="${{ needs.test-ios.result }}"
          PW="${{ needs.test-playwright.result }}"

          echo "- Android E2E: $ANDROID" >> "$GITHUB_STEP_SUMMARY"
          echo "- iOS E2E: $IOS" >> "$GITHUB_STEP_SUMMARY"
          echo "- Playwright Web: $PW" >> "$GITHUB_STEP_SUMMARY"

          FAILED=false
          for RESULT in "$ANDROID" "$IOS" "$PW"; do
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = true ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Some test suites failed.**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ── Generate Unified Allure Report ───────────────────────────
  allure-report:
    name: Generate Allure Report
    needs: [resolve-inputs, test-android, test-playwright]
    if: always() && needs.resolve-inputs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all Allure results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: true

      - name: Sanitize results (strip secrets for public report)
        run: bash .github/scripts/sanitize-allure.sh allure-results-all/

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar xz
          echo "$PWD/allure-2.32.0/bin" >> "$GITHUB_PATH"

      - name: Restore Allure history from gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy history for trend tracking
        run: |
          mkdir -p allure-results-all/history
          cp -r gh-pages/history/* allure-results-all/history/ 2>/dev/null || echo "No previous history (first run)"

      - name: Generate Allure report
        run: allure generate allure-results-all -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false

      - name: Post report URL in summary
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          echo "## Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[View Report](https://${OWNER}.github.io/${REPO##*/}/)" >> "$GITHUB_STEP_SUMMARY"
