name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze-javascript:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          category: /language:javascript

  analyze-kotlin:
    name: Analyze Kotlin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # TEMPORARY: Skip until CodeQL supports Kotlin 2.3.20
    # GitHub CodeQL update expected ~2026-04-09. Remove this 'if' after update.
    # See: KotlinInterceptor$KotlinVersionTooRecentError
    if: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod app/src/local
          if [ -n "$GOOGLE_SERVICES_DEV_BASE64" ]; then
            echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
            cp app/src/dev/google-services.json app/src/prod/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.shyden.shytalk"}},"api_key":[{"current_key":"placeholder"}]},{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.shyden.shytalk.dev"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/src/dev/google-services.json
            cp app/src/dev/google-services.json app/src/prod/google-services.json
          fi
          cp app/src/dev/google-services.json app/src/local/google-services.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build Kotlin project
        run: ./gradlew assembleDevDebug --no-daemon -x lint -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          category: /language:java-kotlin
