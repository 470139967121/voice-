name: Lint

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        type: string
        required: true
      app_changed:
        description: 'Whether app files changed'
        type: boolean
        required: true
      backend_changed:
        description: 'Whether backend files changed'
        type: boolean
        required: true

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up JDK 21
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: Decode google-services.json
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_SERVICES_DEV_BASE64: ${{ secrets.GOOGLE_SERVICES_DEV_BASE64 }}
        run: |
          mkdir -p app/src/dev app/src/prod
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/dev/google-services.json
          echo "$GOOGLE_SERVICES_DEV_BASE64" | base64 -d > app/src/prod/google-services.json

      - name: Run ktlint + detekt
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        run: ./gradlew ktlintCheck detekt

      - name: Express lint (ESLint + Prettier)
        if: inputs.backend_changed == true || github.event_name == 'workflow_dispatch'
        run: |
          cd express-api && npm ci
          npm run lint
          npm run format:check

      - name: Gherkin lint
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        run: bash .claude/hooks/check-gherkin.sh
