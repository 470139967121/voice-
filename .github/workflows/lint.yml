name: Lint

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        type: string
        required: true
      app_changed:
        description: 'Whether app files changed'
        type: boolean
        required: true
      backend_changed:
        description: 'Whether backend files changed'
        type: boolean
        required: true

  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install ktlint
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Run ktlint
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        run: ktlint --relative

      - name: Express lint (ESLint + Prettier)
        if: inputs.backend_changed == true || github.event_name == 'workflow_dispatch'
        run: |
          cd express-api && npm ci
          npm run lint
          npm run format:check

      - name: Gherkin lint
        if: inputs.app_changed == true || github.event_name == 'workflow_dispatch'
        run: bash .claude/hooks/check-gherkin.sh
