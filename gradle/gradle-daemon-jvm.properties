# Gradle daemon JVM toolchain spec.
# Vendor restriction removed: previously pinned to JETBRAINS which forced
# foojay-mediated downloads of JetBrains Runtime on every fresh runner.
# foojay's CDN flakes (HTTP 400, slow paths) caused multiple iOS deploy
# failures on 2026-04-28. Allowing any JDK 21 vendor lets Gradle use the
# JDK already installed on the runner via JAVA_HOME (Temurin, Corretto,
# Zulu, GraalVM all fine) — eliminating the foojay dependency.
toolchainVersion=21
